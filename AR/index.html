// ═══════════════════════════════════════════════════════════════════════════
// CSV PARSER — reads a fresh AR aging export in the same QuickBooks format
// ═══════════════════════════════════════════════════════════════════════════
function parseNum(s) {
  if (!s || typeof s !== "string") return 0;
  s = s.trim().replace(/[$,\s]/g, "");
  if (!s || s === "-") return 0;
  const neg = s.startsWith("(") && s.endsWith(")");
  if (neg) s = s.slice(1, -1);
  const n = parseFloat(s);
  return isNaN(n) ? 0 : neg ? -n : n;
}

function parseCSV(text) {
  const rows = [];
  let cur = "", inQ = false;
  for (const ch of text) {
    if (ch === '"') { inQ = !inQ; cur += ch; }
    else if (ch === '\n' && !inQ) { rows.push(cur); cur = ""; }
    else cur += ch;
  }
  if (cur.trim()) rows.push(cur);
  return rows.map(r => {
    const fields = []; let field = "", q = false;
    for (const ch of r.replace(/\r/g, "")) {
      if (ch === '"') q = !q;
      else if (ch === "," && !q) { fields.push(field.trim()); field = ""; }
      else field += ch;
    }
    fields.push(field.trim());
    return fields;
  });
}

function extractAR(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 3) return null;
  // Header row: find one containing "Current" and ">"
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    if (rows[i].some(c => /current/i.test(c)) && rows[i].some(c => />\s*90/.test(c))) {
      headerIdx = i; break;
    }
  }
  if (headerIdx < 0) return null;

  const out = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 8) continue;
    const name = (r[1] || "").replace(/^"|"$/g, "").trim();
    if (!name || /^total$/i.test(name) || /^total$/i.test(r[0] || "")) continue;
    const current = parseNum(r[2]);
    const d30 = parseNum(r[3]);
    const d60 = parseNum(r[4]);
    const d90 = parseNum(r[5]);
    const over90 = parseNum(r[6]);
    const total = parseNum(r[7]);
    const note = (r[9] || "").replace(/^"|"$/g, "").trim();
    // Skip all-zero rows unless they have a note
    if (total === 0 && !note && current === 0 && d30 === 0 && d60 === 0 && d90 === 0 && over90 === 0) continue;
    out.push({ name, current, d30, d60, d90, over90, total, note });
  }
  return {
    asOf: new Date().toISOString().slice(0, 10),
    source: `Uploaded AR (${new Date().toLocaleDateString("en-US")})`,
    uploadedAt: new Date().toISOString(),
    rows: out,
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// PRIORITIZATION — the core logic
// Assigns each customer to an action bucket using the rules from the
// research playbook:
//   - LITIGATION: already in lawsuit (Momentum)
//   - COLLECTIONS: already handed to 3rd-party collections
//   - WRITE-OFF CANDIDATE: company closed, no collection path
//   - LIEN-WORTHY: >$10K on a single customer, aging fast
//   - DEMAND-LETTER: $2K-$10K, >60 days
//   - PHONE-FIRST: big balance but current (still need AP attention)
//   - SMALL-BUNDLE: <$2K, old, flat-fee agency or write-off
//   - WATCH: significant balance aging through 30-60
//   - HEALTHY: current, no action
// ═══════════════════════════════════════════════════════════════════════════
// Auto-classification from the row data alone — no manual override logic.
// This runs on every row and computes the "natural" bucket the data implies.
function autoClassify(r) {
  const noteL = (r.note || "").toLowerCase();
  // Known statuses from notes field come first
  if (/attorney|litigation|petition|lawsuit/i.test(noteL)) {
    return { bucket: "LITIGATION", priority: 99, reason: r.note, source: "note" };
  }
  if (/company closed|out of business|closed/i.test(noteL)) {
    return { bucket: "WRITE-OFF", priority: 95, reason: r.note || "Company closed", source: "note" };
  }
  if (/collection/i.test(noteL)) {
    return { bucket: "COLLECTIONS", priority: 90, reason: r.note, source: "note" };
  }

  // Skip zeroes, negatives (credits Tejas owes), and the "Tejas" self-row
  if (r.total <= 0 || /^tejas$/i.test(r.name) || /^accrued customer$/i.test(r.name)) {
    return { bucket: "NOACTION", priority: 0, reason: "", source: "auto" };
  }

  // Active business logic — priority is essentially expected-value-of-action
  const old = r.over90 + r.d90;    // serious-age dollars
  const agingPct = r.total > 0 ? (r.d60 + r.d90 + r.over90) / r.total : 0;

  // Big single-lease exposure, mostly aged → lien candidate
  if (old >= 10000) {
    return {
      bucket: "LIEN-WORTHY",
      priority: 80 + Math.min(15, old / 10000),
      reason: `$${Math.round(old).toLocaleString()} in 90+/>90 buckets. Chapter 56 mineral lien candidate per playbook.`,
      source: "auto",
    };
  }

  // Mid-size old balance → attorney demand + credit hold
  if (old >= 2000) {
    return {
      bucket: "DEMAND-LETTER",
      priority: 70 + Math.min(9, old / 1000),
      reason: `$${Math.round(old).toLocaleString()} aged past 60 days. Attorney demand letter + MSA-breach notice.`,
      source: "auto",
    };
  }

  // Big balance, current-ish, but at a major operator worth calling
  if (r.total >= 20000 && r.current / r.total > 0.75) {
    return {
      bucket: "PHONE-FIRST",
      priority: 60 + Math.min(9, r.total / 10000),
      reason: `Large current balance ($${Math.round(r.total).toLocaleString()}) at a major. Call AP to confirm payment schedule before it ages.`,
      source: "auto",
    };
  }

  // Spread-aged balance → account-level conversation needed
  if (r.total >= 5000 && agingPct > 0.4) {
    return {
      bucket: "WATCH",
      priority: 50 + Math.min(9, r.total / 5000),
      reason: `$${Math.round(r.total).toLocaleString()} aging across buckets (${Math.round(agingPct * 100)}% past 30 days). Controller call needed.`,
      source: "auto",
    };
  }

  // Small old balance → bundle for flat-fee agency or write off
  if (old > 0 && old < 2000) {
    return {
      bucket: "SMALL-BUNDLE",
      priority: 30 + Math.min(9, old / 200),
      reason: `$${Math.round(old).toLocaleString()} aged. Bundle with IC System flat-fee or write off.`,
      source: "auto",
    };
  }

  // Large current → healthy
  if (r.total >= 5000 && r.current > r.total * 0.9) {
    return { bucket: "HEALTHY", priority: 10, reason: "Current and paying.", source: "auto" };
  }

  // Catch-all for everything small
  return { bucket: "HEALTHY", priority: 5, reason: "", source: "auto" };
}

// Final classifier — applies manual override on top of auto-classification.
// Priority order: manual override > note-based > aging-based.
// If manualBucket is set, the row shows in that bucket. Otherwise autoClassify wins.
function classifyRow(r) {
  const auto = autoClassify(r);
  if (r.manualBucket && BUCKETS_KEYS.includes(r.manualBucket)) {
    return {
      bucket: r.manualBucket,
      priority: auto.priority, // keep the auto priority so ranking still works
      reason: r.manualReason || auto.reason,
      source: "manual",
      autoBucket: auto.bucket, // remember what the data *would* say, for the drift check
    };
  }
  return { ...auto, autoBucket: auto.bucket };
}

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
const fmt = (n) => {
  if (n === 0) return "$0";
  if (Math.abs(n) >= 1e6) return `$${(n / 1e6).toFixed(2)}M`;
  if (Math.abs(n) >= 1000) return `$${(n / 1000).toFixed(1)}K`;
  return `$${Math.round(n)}`;
};
const fmtFull = (n) => {
  if (n === 0) return "—";
  const s = `$${Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 })}`;
  return n < 0 ? `(${s})` : s;
};
const timeAgo = (iso) => {
  if (!iso) return "never";
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 60) return "just now";
  if (sec < 3600) return `${Math.floor(sec / 60)} min ago`;
  if (sec < 86400) return `${Math.floor(sec / 3600)} hr ago`;
  return `${Math.floor(sec / 86400)}d ago`;
};
const shortDate = (iso) => {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "numeric", day: "numeric", year: "2-digit" });
  } catch (e) { return "—"; }
};

function Eyebrow({ children, color, style }) {

function Card({ children, accent, accentSide = "top", cream, style, padding = 24 }) {
  const ab = accent ? { [`border${accentSide === "top" ? "Top" : "Left"}`]: `3px solid ${accent}` } : {};

// Inline-editable cell. Click to edit, Enter/Tab/blur to save, Escape to cancel.
// Numeric values are formatted (e.g. $1,234) when not focused and edited raw
// (e.g. 1234) when focused, which is the right default for a spreadsheet UX.
function EditableCell({ value, onSave, numeric = false, align = "left", placeholder = "—", style = {}, display }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState("");

  const beginEdit = () => {
    // When entering edit mode on a numeric cell, show the raw number (not formatted)
    if (numeric) {
      setDraft(value === 0 || value == null ? "" : String(value));
    } else {
      setDraft(value || "");
    }
    setEditing(true);
  };

  const commit = () => {
    setEditing(false);
    if (numeric) {
      const n = parseFloat(String(draft).replace(/[$,\s()]/g, "")) || 0;
      const isNeg = String(draft).trim().startsWith("(") && String(draft).trim().endsWith(")");
      const finalVal = isNeg ? -Math.abs(n) : n;
      if (finalVal !== value) onSave(finalVal);
    } else {
      if (draft !== value) onSave(draft);
    }
  };

  const cancel = () => { setEditing(false); setDraft(""); };

  if (editing) {
    return (
      <input
        autoFocus
        type={numeric ? "text" : "text"}
        value={draft}
        onChange={e => setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={e => {
          if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); commit(); }
          else if (e.key === "Escape") { e.preventDefault(); cancel(); }
        }}
        style={{
          width: "100%", padding: "4px 6px", fontSize: "inherit",
          fontFamily: "inherit", border: `1.5px solid ${tj.sky}`,
          outline: "none", background: tj.white, textAlign: align,
          boxSizing: "border-box", ...style,
        }}
      />
    );
  }

  const displayText = display != null ? display : (value || value === 0 ? (numeric ? value : value) : placeholder);
  return (
    <span
      onClick={beginEdit}
      title="Click to edit"
      style={{
        cursor: "text", display: "inline-block", width: "100%",
        minHeight: 16, padding: "2px 4px", borderRadius: 0,
        textAlign: align, ...style,
      }}
      onMouseEnter={e => { e.currentTarget.style.background = tj.surfaceCream; }}
      onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}
    >
      {displayText}
    </span>
  );
}

// StatusControl — a dropdown for manually overriding the row's action bucket.
// Shows the current effective bucket as a colored chip; clicking reveals a
// menu of all available statuses plus "Auto" to clear the override.
// Also shows a small history icon with a badge if the row has any status
// changes logged; clicking it reveals an inline history list.
function StatusControl({ row, currentBucket, onSetStatus, compact = false }) {
  const [open, setOpen] = useState(false);
  const [historyOpen, setHistoryOpen] = useState(false);
  const meta = BUCKETS[currentBucket] || BUCKETS.HEALTHY;
  const isManual = !!row.manualBucket;
  const history = row.statusHistory || [];

  // The chip itself: clicking opens the dropdown
  // Options in the dropdown: all buckets (in display order) + "Auto (reset)"
  const options = Object.entries(BUCKETS)
    .sort(([, a], [, b]) => a.rank - b.rank)
    .map(([k, v]) => ({ key: k, label: v.label.split(" ·")[0], color: v.color, bg: v.bg }));

  return (
    <div style={{ position: "relative", display: "inline-flex", alignItems: "center", gap: 6 }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          background: meta.bg, color: meta.color, border: `1px solid ${isManual ? meta.color : "transparent"}`,
          padding: compact ? "2px 7px" : "3px 10px", fontSize: compact ? 9 : 10, fontWeight: 700,
          letterSpacing: "0.08em", textTransform: "uppercase",
          whiteSpace: "nowrap", fontFamily: tj.fontSans,
          cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4,
        }}
        title={isManual ? `Manually set${row.manualSetAt ? " " + shortDate(row.manualSetAt) : ""}${row.manualReason ? ". " + row.manualReason : ""}` : "Auto-classified — click to override"}
      >
        {isManual && <span style={{ fontSize: compact ? 8 : 9 }}>●</span>}
        {meta.label.split(" ·")[0]}
        <span style={{ fontSize: compact ? 8 : 9, opacity: 0.7 }}>▾</span>
      </button>

      {history.length > 0 && (
        <button
          onClick={() => setHistoryOpen(o => !o)}
          title={`${history.length} status change${history.length === 1 ? "" : "s"} — click to see history`}
          style={{
            background: "transparent", border: "none", cursor: "pointer",
            fontSize: 10, color: tj.gray500, padding: "2px 4px",
            fontFamily: tj.fontMono, letterSpacing: 0,
          }}
        >
          ⌛{history.length}
        </button>
      )}

      {open && (
        <>
          {/* click-outside dismiss */}
          <div onClick={() => setOpen(false)} style={{
            position: "fixed", inset: 0, zIndex: 50, background: "transparent",
          }} />
          <div style={{
            position: "absolute", top: "100%", left: 0, marginTop: 4, zIndex: 51,
            background: tj.white, border: `1px solid ${tj.navy900}`,
            boxShadow: "0 4px 16px rgba(0, 32, 96, 0.15)",
            minWidth: 220, padding: 4,
          }}>
            {options.map(o => {
              const isCurrent = o.key === currentBucket;
              return (
                <button
                  key={o.key}
                  onClick={() => {
                    const reason = o.key === currentBucket ? "" : (window.prompt(`Optional note for marking as ${o.label}:`, "") || "");
                    onSetStatus(o.key, reason);
                    setOpen(false);
                  }}
                  style={{
                    display: "flex", alignItems: "center", gap: 8, width: "100%",
                    padding: "8px 10px", border: "none", cursor: "pointer", textAlign: "left",
                    background: isCurrent ? o.bg : "transparent", fontFamily: tj.fontSans, fontSize: 11,
                    color: o.color, fontWeight: isCurrent ? 700 : 500,
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = o.bg}
                  onMouseLeave={e => e.currentTarget.style.background = isCurrent ? o.bg : "transparent"}
                >
                  <span style={{ width: 10, height: 10, background: o.color, display: "inline-block", flexShrink: 0 }} />
                  <span style={{ flex: 1 }}>{o.label}</span>
                  {isCurrent && !isManual && <span style={{ fontSize: 8, color: tj.gray500, letterSpacing: "0.1em" }}>AUTO</span>}
                  {isCurrent && isManual && <span style={{ fontSize: 8, color: tj.gray500, letterSpacing: "0.1em" }}>MANUAL</span>}
                </button>
              );
            })}
            {isManual && (
              <>
                <div style={{ height: 1, background: tj.border, margin: "4px 0" }} />
                <button
                  onClick={() => { onSetStatus("AUTO"); setOpen(false); }}
                  style={{
                    display: "flex", alignItems: "center", gap: 8, width: "100%",
                    padding: "8px 10px", border: "none", cursor: "pointer", textAlign: "left",
                    background: "transparent", fontFamily: tj.fontSans, fontSize: 11,
                    color: tj.gray700, fontStyle: "italic",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = tj.surfaceCream}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                >
                  ↺ Clear override (return to auto)
                </button>
              </>
            )}
          </div>
        </>
      )}

      {historyOpen && history.length > 0 && (
        <>
          <div onClick={() => setHistoryOpen(false)} style={{
            position: "fixed", inset: 0, zIndex: 50, background: "transparent",
          }} />
          <div style={{
            position: "absolute", top: "100%", right: 0, marginTop: 4, zIndex: 51,
            background: tj.white, border: `1px solid ${tj.navy900}`,
            boxShadow: "0 4px 16px rgba(0, 32, 96, 0.15)",
            minWidth: 280, maxWidth: 360, padding: 0,
          }}>
            <div style={{ padding: "10px 12px", borderBottom: `1px solid ${tj.border}`, fontFamily: tj.fontSans, fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 700, color: tj.gray700 }}>
              Status History · {history.length} change{history.length === 1 ? "" : "s"}
            </div>
            <div style={{ maxHeight: 320, overflowY: "auto" }}>
              {history.slice().reverse().map((h, hi) => {
                const fromMeta = BUCKETS[h.from];
                const toMeta = BUCKETS[h.to];
                const isAuto = h.kind === "auto-drift-clear";
                return (
                  <div key={hi} style={{
                    padding: "8px 12px", borderBottom: hi < history.length - 1 ? `1px solid ${tj.border}` : "none",
                    fontSize: 11, fontFamily: tj.fontSans,
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                      <span style={{ fontFamily: tj.fontMono, fontSize: 10, color: tj.gray700, fontWeight: 700 }}>
                        {shortDate(h.at)}
                      </span>
                      {isAuto && <span style={{ fontSize: 8, color: tj.warn, fontWeight: 700, letterSpacing: "0.1em", background: tj.warnBg, padding: "1px 6px" }}>AUTO</span>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10 }}>
                      <span style={{ color: fromMeta?.color || tj.gray500, fontWeight: 700 }}>{fromMeta?.label.split(" ·")[0] || h.from}</span>
                      <span style={{ color: tj.gray500 }}>→</span>
                      <span style={{ color: toMeta?.color || tj.gray500, fontWeight: 700 }}>{toMeta?.label.split(" ·")[0] || h.to}</span>
                    </div>
                    {h.note && (
                      <div style={{ fontSize: 11, color: tj.gray700, fontStyle: "italic", fontFamily: tj.fontSerif, marginTop: 4, lineHeight: 1.4 }}>
                        {h.note}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// StrikeMark — shows the current strike count as red tick marks next to a
// customer name. Hover to see a popover with each strike's date, source
// (auto / manual), and note; buttons let you add or remove strikes manually.
// At 5 strikes, visual becomes alarming (red background fill) and a
// "PAY UPFRONT" flag renders.
const STRIKE_LIMIT = 5;

function StrikeMark({ row, rowIdx, onAdd, onRemove, compact = false }) {
  const [open, setOpen] = useState(false);
  const strikes = row.strikes || [];
  const count = strikes.length;
  const atLimit = count >= STRIKE_LIMIT;
  if (count === 0 && !compact) {
    // Show a subtle "add strike" affordance if there are none yet
    return (
      <span
        onClick={e => { e.stopPropagation(); setOpen(o => !o); }}
        title="No strikes — click to manage"
        style={{ color: tj.gray300, fontSize: 10, cursor: "pointer", padding: "0 4px", userSelect: "none" }}
      >
        ○
      </span>
    );
  }
  // Tick marks — up to STRIKE_LIMIT, thickening as count rises. At limit,
  // swap to a single solid "PAY UPFRONT" badge.
  return (
    <span style={{ position: "relative", display: "inline-flex", alignItems: "center", gap: 3 }}>
      {atLimit ? (
        <span
          onClick={e => { e.stopPropagation(); setOpen(o => !o); }}
          title={`${count} strikes — set this customer to pay upfront`}
          style={{
            background: tj.crimson, color: tj.white,
            padding: "1px 7px", fontSize: compact ? 9 : 10, fontWeight: 700,
            letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: tj.fontSans,
            cursor: "pointer", whiteSpace: "nowrap",
          }}
        >
          ✕{count} · Pay Upfront
        </span>
      ) : (
        <span
          onClick={e => { e.stopPropagation(); setOpen(o => !o); }}
          title={`${count} strike${count === 1 ? "" : "s"} — click to view / edit`}
          style={{ display: "inline-flex", gap: 1, cursor: "pointer", padding: "0 2px" }}
        >
          {Array.from({ length: count }).map((_, i) => (
            <span key={i} style={{
              display: "inline-block",
              width: compact ? 3 : 4, height: compact ? 10 : 12,
              background: tj.crimson, opacity: 0.7 + (i * 0.06),
            }} />
          ))}
          {Array.from({ length: STRIKE_LIMIT - count }).map((_, i) => (
            <span key={`e${i}`} style={{
              display: "inline-block",
              width: compact ? 3 : 4, height: compact ? 10 : 12,
              background: "transparent", border: `1px solid ${tj.gray300}`,
            }} />
          ))}
        </span>
      )}

      {open && (
        <>
          <div onClick={() => setOpen(false)} style={{
            position: "fixed", inset: 0, zIndex: 50, background: "transparent",
          }} />
          <div style={{
            position: "absolute", top: "100%", left: 0, marginTop: 4, zIndex: 51,
            background: tj.white, border: `1px solid ${tj.crimson}`,
            boxShadow: "0 4px 16px rgba(0, 32, 96, 0.15)",
            minWidth: 280, maxWidth: 380, padding: 0,
          }}>
            <div style={{
              padding: "10px 12px", borderBottom: `1px solid ${tj.border}`,
              fontFamily: tj.fontSans, fontSize: 10, letterSpacing: "0.1em",
              textTransform: "uppercase", fontWeight: 700,
              color: atLimit ? tj.crimson : tj.gray700,
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <span>Strikes · {count} of {STRIKE_LIMIT}</span>
              {atLimit && <span style={{ fontStyle: "italic" }}>require prepayment</span>}
            </div>
            {strikes.length === 0 ? (
              <div style={{ padding: "12px", fontSize: 12, color: tj.gray500, fontStyle: "italic", fontFamily: tj.fontSerif }}>
                No strikes logged yet.
              </div>
            ) : (
              <div style={{ maxHeight: 280, overflowY: "auto" }}>
                {strikes.slice().reverse().map((s, rIdx) => {
                  const actualIdx = strikes.length - 1 - rIdx;
                  return (
                    <div key={actualIdx} style={{
                      padding: "8px 12px", borderBottom: rIdx < strikes.length - 1 ? `1px solid ${tj.border}` : "none",
                      fontSize: 11, fontFamily: tj.fontSans,
                      display: "flex", justifyContent: "space-between", gap: 8,
                    }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                          <span style={{ fontFamily: tj.fontMono, fontSize: 10, color: tj.gray700, fontWeight: 700 }}>
                            {shortDate(s.at)}
                          </span>
                          <span style={{
                            fontSize: 8, color: s.source === "auto" ? tj.warn : tj.crimson,
                            fontWeight: 700, letterSpacing: "0.1em",
                            background: s.source === "auto" ? tj.warnBg : tj.badBg,
                            padding: "1px 5px",
                          }}>
                            {s.source === "auto" ? "AUTO" : "MANUAL"}
                          </span>
                        </div>
                        {s.note && (
                          <div style={{ fontSize: 11, color: tj.gray700, fontStyle: "italic", fontFamily: tj.fontSerif, lineHeight: 1.4 }}>
                            {s.note}
                          </div>
                        )}
                      </div>
                      <button
                        onClick={() => { if (window.confirm(`Remove this strike from ${row.name}?`)) onRemove(actualIdx); }}
                        title="Remove strike"
                        style={{
                          background: "transparent", border: "none", cursor: "pointer",
                          color: tj.gray500, fontSize: 14, padding: "0 4px", lineHeight: 1,
                        }}
                        onMouseEnter={e => e.currentTarget.style.color = tj.crimson}
                        onMouseLeave={e => e.currentTarget.style.color = tj.gray500}
                      >×</button>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{ padding: "8px 12px", borderTop: `1px solid ${tj.border}`, background: tj.surfaceCream }}>
              <button
                onClick={() => {
                  const note = window.prompt("Reason for adding a strike (optional):", "") || "";
                  onAdd(note);
                }}
                style={{
                  background: tj.crimson, color: tj.white, border: "none",
                  padding: "6px 12px", fontSize: 10, fontWeight: 700, cursor: "pointer",
                  letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: tj.fontSans,
                  width: "100%",
                }}
              >+ Add Strike</button>
            </div>
          </div>
        </>
      )}
    </span>
  );
}

  return (
    <Card accent={meta.color} style={{ marginBottom: 16 }} padding={0}>

                  <td style={{ padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono, color: r.current > 0 ? tj.ink : tj.gray500 }}>{fmtFull(r.current)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono, color: r.d30 > 0 ? tj.ink : tj.gray500 }}>{fmtFull(r.d30)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono, color: r.d60 > 0 ? tj.warn : tj.gray500 }}>{fmtFull(r.d60)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono, color: r.d90 > 0 ? tj.warn : tj.gray500 }}>{fmtFull(r.d90)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono, color: r.over90 > 0 ? tj.crimson : tj.gray500, fontWeight: r.over90 > 0 ? 700 : 400 }}>{fmtFull(r.over90)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono, fontWeight: 700, color: tj.navy900 }}>{fmtFull(r.total)}</td>

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState("priorities");
  const [AR, setAR] = useState(INIT_AR);
  const [msg, setMsg] = useState("");
  const [expanded, setExpanded] = useState({
    LITIGATION: false, COLLECTIONS: true, "WRITE-OFF": true,
    "LIEN-WORTHY": true, "DEMAND-LETTER": true, "PHONE-FIRST": true,
    WATCH: true, "SMALL-BUNDLE": false, HEALTHY: false, NOACTION: false,
  });

  useEffect(() => {
    (async () => {
      try { const s = await window.storage.get("tejas-ar-v1"); if (s?.value) setAR(JSON.parse(s.value)); } catch (e) {}
    })();
  }, []);

  const handleFile = useCallback(async (file) => {
    const text = await file.text();
    const parsed = extractAR(text);
    if (!parsed || parsed.rows.length === 0) {
      setMsg("Could not parse CSV — check format matches QuickBooks AR Aging Summary");
      setTimeout(() => setMsg(""), 5000);
      return;
    }
    // MERGE: update aging numbers from CSV, preserve manual notes + lastUpdated
    // on rows the user has touched since the last upload. Also preserve manual
    // status overrides — but check each one for "drift" (aging dropped more
    // than 50% since the override was set) and auto-clear stale overrides
    // with a history entry so there's a paper trail.
    setAR(prev => {
      const prevByName = new Map((prev.rows || []).map(r => [r.name.toLowerCase().trim(), r]));
      const csvByName = new Map(parsed.rows.map(r => [r.name.toLowerCase().trim(), r]));
      const merged = [];
      let updated = 0, added = 0, keptManual = 0, driftCleared = 0, strikesAdded = 0;
      // All CSV rows come in with their fresh aging values
      for (const csvRow of parsed.rows) {
        const key = csvRow.name.toLowerCase().trim();
        const existing = prevByName.get(key);
        if (existing) {
          // Customer matched: take CSV aging numbers, keep user-edited notes,
          // status overrides, and history.
          const userEditedNote = existing.note && existing.note !== csvRow.note;
          const mergedRow = {
            ...csvRow,
            note: userEditedNote ? existing.note : csvRow.note,
            lastUpdated: userEditedNote ? existing.lastUpdated : csvRow.lastUpdated,
            manuallyAdded: existing.manuallyAdded || false,
            manualBucket: existing.manualBucket || null,
            manualReason: existing.manualReason || "",
            manualSetAt: existing.manualSetAt || null,
            manualSetAgedDollars: existing.manualSetAgedDollars ?? null,
            statusHistory: existing.statusHistory || [],
          };
          // Drift check: if aged dollars have dropped by ≥50% since the
          // override was set, the override is likely stale (customer paid).
          // Auto-clear it and log the transition.
          if (mergedRow.manualBucket && mergedRow.manualSetAgedDollars != null) {
            const newAged = (mergedRow.over90 || 0) + (mergedRow.d90 || 0) + (mergedRow.d60 || 0);
            const drop = mergedRow.manualSetAgedDollars - newAged;
            const dropPct = mergedRow.manualSetAgedDollars > 0 ? drop / mergedRow.manualSetAgedDollars : 0;
            if (dropPct >= 0.5 && drop >= 500) {
              // Clear the override, log the auto-clear in history
              const autoBucket = autoClassify(mergedRow).bucket;
              mergedRow.statusHistory = [
                ...mergedRow.statusHistory,
                {
                  at: new Date().toISOString(),
                  from: mergedRow.manualBucket,
                  to: autoBucket,
                  kind: "auto-drift-clear",
                  note: `Aged dollars dropped ${Math.round(dropPct * 100)}% ($${Math.round(drop).toLocaleString()}) — status reset to auto.`,
                },
              ];
              mergedRow.manualBucket = null;
              mergedRow.manualReason = "";
              mergedRow.manualSetAt = null;
              mergedRow.manualSetAgedDollars = null;
              driftCleared++;
            }
          }
          // Strike detection: edge-triggered when a customer crosses from
          // $0 in the >90 bucket to >$500 in the >90 bucket. One strike per
          // "entry event" — once in >90, no additional strikes until they
          // exit (drop to $0) and re-enter. Threshold of $500 avoids
          // penalizing customers for stray credit memos or rounding.
          mergedRow.strikes = existing.strikes || [];
          const prevOver90 = existing.over90 || 0;
          const newOver90 = mergedRow.over90 || 0;
          const STRIKE_THRESHOLD = 500;
          if (prevOver90 <= STRIKE_THRESHOLD && newOver90 > STRIKE_THRESHOLD) {
            // Crossed INTO >90 with meaningful dollars — add a strike
            mergedRow.strikes = [
              ...mergedRow.strikes,
              {
                at: new Date().toISOString(),
                source: "auto",
                amount: newOver90,
                note: `Crossed into >90 days with $${Math.round(newOver90).toLocaleString()}`,
              },
            ];
            strikesAdded++;
          }

          merged.push(mergedRow);
          updated++;
        } else {
          merged.push({ ...csvRow, manuallyAdded: false, manualBucket: null, statusHistory: [], strikes: [] });
          added++;
        }
      }
      // Keep manually-added rows that aren't in the CSV
      for (const prevRow of prev.rows || []) {
        const key = prevRow.name.toLowerCase().trim();
        if (!csvByName.has(key) && prevRow.manuallyAdded) {
          merged.push(prevRow);
          keptManual++;
        }
      }
      const next = {
        ...parsed,
        rows: merged,
        source: `Uploaded AR (${new Date().toLocaleDateString("en-US")}) · merged`,
      };
      let msg = `Merged: ${updated} updated, ${added} new, ${keptManual} manual row${keptManual === 1 ? "" : "s"} kept`;
      if (driftCleared > 0) msg += ` · ${driftCleared} status${driftCleared === 1 ? "" : "es"} auto-cleared (paid down)`;
      if (strikesAdded > 0) msg += ` · ${strikesAdded} strike${strikesAdded === 1 ? "" : "s"} logged`;
      setMsg(msg);
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      return next;
    });
    setTimeout(() => setMsg(""), 8000);
  }, []);
  const onDrop = useCallback((e) => { e.preventDefault(); const f = e.dataTransfer?.files?.[0]; if (f) handleFile(f); }, [handleFile]);
  const onInput = useCallback((e) => { const f = e.target.files?.[0]; if (f) handleFile(f); }, [handleFile]);

  const resetData = useCallback(async () => {
    if (!window.confirm("Reset AR data back to pre-loaded sample?")) return;
    setAR(INIT_AR);
    try { await window.storage.delete("tejas-ar-v1"); } catch (e) {}
    setMsg("Reset to pre-loaded sample");
    setTimeout(() => setMsg(""), 3000);
  }, []);

  // ── Row editing: updates a single field on a single row, auto-stamps
  // lastUpdated, and recalculates total if a bucket amount changed.
  // Uses functional setAR so rapid edits don't clobber each other.
  const updateRow = useCallback((rowIdx, field, value) => {
    setAR(prev => {
      const rows = [...(prev.rows || [])];
      if (rowIdx < 0 || rowIdx >= rows.length) return prev;
      const r = { ...rows[rowIdx] };
      // Coerce numeric fields
      if (["current", "d30", "d60", "d90", "over90"].includes(field)) {
        const parsed = parseFloat(String(value).replace(/[$,\s]/g, "")) || 0;
        r[field] = parsed;
        // Auto-recalculate total from buckets
        r.total = (r.current || 0) + (r.d30 || 0) + (r.d60 || 0) + (r.d90 || 0) + (r.over90 || 0);
      } else if (field === "total") {
        // If they try to edit total directly, honor it but warn via note
        r.total = parseFloat(String(value).replace(/[$,\s]/g, "")) || 0;
      } else {
        r[field] = value;
      }
      r.lastUpdated = new Date().toISOString();
      rows[rowIdx] = r;
      const next = { ...prev, rows };
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      return next;
    });
  }, []);

  const addRow = useCallback(() => {
    const name = window.prompt("Customer name for new row:");
    if (!name || !name.trim()) return;
    setAR(prev => {
      const exists = (prev.rows || []).some(r => r.name.toLowerCase().trim() === name.toLowerCase().trim());
      if (exists) {
        setMsg(`"${name}" already exists — edit the existing row instead`);
        setTimeout(() => setMsg(""), 4000);
        return prev;
      }
      const newRow = {
        name: name.trim(),
        current: 0, d30: 0, d60: 0, d90: 0, over90: 0, total: 0,
        note: "", lastUpdated: new Date().toISOString(),
        manuallyAdded: true,
      };
      const next = { ...prev, rows: [...(prev.rows || []), newRow] };
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      setMsg(`Added ${name.trim()} — now edit the amounts`);
      setTimeout(() => setMsg(""), 4000);
      return next;
    });
  }, []);

  const deleteRow = useCallback((rowIdx) => {
    setAR(prev => {
      const rows = [...(prev.rows || [])];
      if (rowIdx < 0 || rowIdx >= rows.length) return prev;
      const name = rows[rowIdx].name;
      if (!window.confirm(`Delete "${name}" from the dashboard?\n\nNote: if this customer is in your next CSV upload, the row will come back automatically.`)) return prev;
      rows.splice(rowIdx, 1);
      const next = { ...prev, rows };
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      return next;
    });
  }, []);

  // ── Status override: manually set a row's bucket. Logs the change in
  // history so there's a paper trail of decisions. Passing null (or "AUTO")
  // clears the override and lets auto-classification take over again.
  const setRowStatus = useCallback((rowIdx, newBucket, manualReason = "") => {
    setAR(prev => {
      const rows = [...(prev.rows || [])];
      if (rowIdx < 0 || rowIdx >= rows.length) return prev;
      const r = { ...rows[rowIdx] };
      const currentBucket = r.manualBucket || autoClassify(r).bucket;
      const nextBucket = (newBucket === "AUTO" || newBucket === null) ? null : newBucket;
      // No-op if nothing actually changed
      if (nextBucket === r.manualBucket) return prev;
      const entry = {
        at: new Date().toISOString(),
        from: currentBucket,
        to: nextBucket || autoClassify(r).bucket,
        kind: nextBucket ? "manual-set" : "manual-clear",
        note: manualReason || "",
      };
      r.manualBucket = nextBucket;
      r.manualReason = nextBucket ? (manualReason || r.manualReason || "") : "";
      r.manualSetAt = nextBucket ? new Date().toISOString() : null;
      r.statusHistory = [...(r.statusHistory || []), entry];
      r.lastUpdated = new Date().toISOString();
      // Snapshot the aging numbers at the moment of the override — used by
      // the drift check later to decide if the override has gone stale.
      if (nextBucket) {
        r.manualSetAgedDollars = (r.over90 || 0) + (r.d90 || 0) + (r.d60 || 0);
      } else {
        r.manualSetAgedDollars = null;
      }
      rows[rowIdx] = r;
      const next = { ...prev, rows };
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      return next;
    });
  }, []);

  // ── Strike editing: add a manual strike (with note) or remove an existing
  // one (by index). Manual strikes are tagged source="manual" so the history
  // shows how each strike landed.
  const addStrike = useCallback((rowIdx, note = "") => {
    setAR(prev => {
      const rows = [...(prev.rows || [])];
      if (rowIdx < 0 || rowIdx >= rows.length) return prev;
      const r = { ...rows[rowIdx] };
      r.strikes = [
        ...(r.strikes || []),
        {
          at: new Date().toISOString(),
          source: "manual",
          amount: r.over90 || 0,
          note: note || "Manual strike",
        },
      ];
      r.lastUpdated = new Date().toISOString();
      rows[rowIdx] = r;
      const next = { ...prev, rows };
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      return next;
    });
  }, []);

  const removeStrike = useCallback((rowIdx, strikeIdx) => {
    setAR(prev => {
      const rows = [...(prev.rows || [])];
      if (rowIdx < 0 || rowIdx >= rows.length) return prev;
      const r = { ...rows[rowIdx] };
      const strikes = [...(r.strikes || [])];
      if (strikeIdx < 0 || strikeIdx >= strikes.length) return prev;
      strikes.splice(strikeIdx, 1);
      r.strikes = strikes;
      r.lastUpdated = new Date().toISOString();
      rows[rowIdx] = r;
      const next = { ...prev, rows };
      (async () => { try { await window.storage.set("tejas-ar-v1", JSON.stringify(next)); } catch (e) {} })();
      return next;
    });
  }, []);

  // ── Classify everything ──────────────────────────────────────────
  // (Re-run on every render so that edits, status overrides, and strike
  // changes flow through to all derived views without manual refresh.)
  const classified = AR.rows.map(r => ({ ...r, ...classifyRow(r) }));

  // Headline metrics
  const totalAR = classified.reduce((s, r) => s + r.total, 0);
  const litigationTotal = classified.filter(r => r.bucket === "LITIGATION").reduce((s, r) => s + r.total, 0);
  const collectionsTotal = classified.filter(r => r.bucket === "COLLECTIONS").reduce((s, r) => s + r.total, 0);
  const writeoffTotal = classified.filter(r => r.bucket === "WRITE-OFF").reduce((s, r) => s + r.total, 0);
  const handledTotal = litigationTotal + collectionsTotal + writeoffTotal;
  const workableTotal = totalAR - handledTotal;

  // Aging composition: EXCLUDES handled accounts (litigation, collections,
  // write-offs). Momentum's $339K in the >90 bucket would otherwise dominate
  // the bar and make the aging picture look worse than operational reality.
  // This bar reflects the AR we're actually working on.
  const workableClassified = classified.filter(r => !["LITIGATION", "COLLECTIONS", "WRITE-OFF"].includes(r.bucket));
  const bucketTotals = {
    current: workableClassified.reduce((s, r) => s + Math.max(0, r.current), 0),
    d30: workableClassified.reduce((s, r) => s + Math.max(0, r.d30), 0),
    d60: workableClassified.reduce((s, r) => s + Math.max(0, r.d60), 0),
    d90: workableClassified.reduce((s, r) => s + Math.max(0, r.d90), 0),
    over90: workableClassified.reduce((s, r) => s + Math.max(0, r.over90), 0),
  };
  // Workable >90 excludes handled accounts
  const workableOver90 = bucketTotals.over90;

  // Handled totals by bucket (for the note on the composition bar — shows
  // how much is parked in each "already handled" state without inflating the
  // main numbers)
  const handledBuckets = {
    litigation: classified.filter(r => r.bucket === "LITIGATION").reduce((s, r) => s + Math.max(0, r.over90 + r.d90 + r.d60 + r.d30 + r.current), 0),
    collections: classified.filter(r => r.bucket === "COLLECTIONS").reduce((s, r) => s + Math.max(0, r.over90 + r.d90 + r.d60 + r.d30 + r.current), 0),
    writeoff: classified.filter(r => r.bucket === "WRITE-OFF").reduce((s, r) => s + Math.max(0, r.over90 + r.d90 + r.d60 + r.d30 + r.current), 0),
  };

  // Group by bucket
  const byBucket = {};
  for (const k of Object.keys(BUCKETS)) byBucket[k] = [];
  for (const r of classified) (byBucket[r.bucket] || byBucket.NOACTION).push(r);
  // Sort each bucket by priority desc, then total desc
  for (const k of Object.keys(byBucket)) {
    byBucket[k].sort((a, b) => (b.priority - a.priority) || (b.total - a.total));
  }

  // Top 10 action list (highest-priority across all action buckets)
  const actionable = classified
    .filter(r => !["LITIGATION", "COLLECTIONS", "WRITE-OFF", "HEALTHY", "NOACTION"].includes(r.bucket))
    .sort((a, b) => (b.priority - a.priority) || (b.total - a.total))
    .slice(0, 10);

  const tabs = [
    { id: "priorities", label: "Action Priorities" },
    { id: "aging",      label: "Aging View" },
    { id: "all",        label: "All Customers" },
  ];

  // ═══════════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════════
  return (
    <div style={{ background: tj.bg, color: tj.ink, minHeight: "100vh", fontFamily: tj.fontSans }}>
      <div style={{ height: 4, background: tj.crimson }} />

      <div style={{ maxWidth: 1320, margin: "0 auto", padding: "28px 32px 48px" }}>
        {/* HEADER */}
        <header style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 24, gap: 16, flexWrap: "wrap" }}>
          <div>
            <Eyebrow style={{ marginBottom: 6 }}>Accounts Receivable · Collections Dashboard</Eyebrow>
            <h1 style={{ fontFamily: tj.fontSerif, fontSize: 42, fontWeight: 700, color: tj.navy900,
                         letterSpacing: "0.02em", lineHeight: 1, margin: 0 }}>
              WHO DO WE CALL FIRST?
            </h1>
            <span style={{ display: "block", height: 3, width: 48, background: tj.crimson, marginTop: 14 }} />
            <div style={{ fontFamily: tj.fontSerif, fontSize: 13, color: tj.gray700, marginTop: 10, fontStyle: "italic" }}>
              {AR.source || `As of ${AR.asOf}`} · {classified.length} customers
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
            <label
              onDragOver={e => e.preventDefault()}
              onDrop={onDrop}
              style={{
                background: tj.surfaceCream, border: `1px dashed ${tj.gray500}`,
                padding: "10px 18px", fontSize: 11, color: tj.gray700, cursor: "pointer",
                letterSpacing: "0.05em", textAlign: "center", fontFamily: tj.fontSans,
              }}>
              Drop or click · fresh AR Aging <b style={{ color: tj.navy900 }}>.csv</b> export
              <input type="file" accept=".csv" onChange={onInput} style={{ display: "none" }} />
            </label>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ fontSize: 10, color: tj.gray500, letterSpacing: "0.08em", fontFamily: tj.fontSans }}>
                Last upload: <span style={{ color: AR.uploadedAt ? tj.ok : tj.warn, fontWeight: 700 }}>{timeAgo(AR.uploadedAt)}</span>
              </div>
              <button onClick={resetData} style={{
                background: "transparent", color: tj.gray700, border: `1px solid ${tj.border}`,
                padding: "4px 10px", fontSize: 9, fontWeight: 700, cursor: "pointer",
                letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: tj.fontSans,
              }}>Reset</button>
            </div>
            {msg && <div style={{ fontSize: 11, color: tj.navy900, fontWeight: 700, fontFamily: tj.fontSans }}>{msg}</div>}
          </div>
        </header>

        {/* HEADLINE CARDS */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 16, marginBottom: 24 }}>
          <Card accent={tj.navy900} accentSide="left" padding={20}>
            <Eyebrow>Total AR Outstanding</Eyebrow>
            <div style={{ fontFamily: tj.fontSerif, fontSize: 32, fontWeight: 700, color: tj.navy900, marginTop: 6, letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>
              {fmtFull(totalAR)}
            </div>
            <div style={{ fontSize: 11, color: tj.gray500, marginTop: 4, fontFamily: tj.fontSerif, fontStyle: "italic" }}>
              across {classified.filter(r => r.total > 0).length} customers
            </div>
          </Card>

          <Card accent={tj.crimson} accentSide="left" padding={20}>
            <Eyebrow color={tj.crimson}>Actionable Collections</Eyebrow>
            <div style={{ fontFamily: tj.fontSerif, fontSize: 32, fontWeight: 700, color: tj.crimson, marginTop: 6, letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>
              {fmtFull(workableTotal)}
            </div>
            <div style={{ fontSize: 11, color: tj.gray500, marginTop: 4, fontFamily: tj.fontSerif, fontStyle: "italic" }}>
              excludes litigation, collections, write-offs
            </div>
          </Card>

          <Card accent={tj.warn} accentSide="left" padding={20}>
            <Eyebrow color={tj.warn}>&gt;90 Days · Workable</Eyebrow>
            <div style={{ fontFamily: tj.fontSerif, fontSize: 32, fontWeight: 700, color: tj.warn, marginTop: 6, letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>
              {fmtFull(workableOver90)}
            </div>
            <div style={{ fontSize: 11, color: tj.gray500, marginTop: 4, fontFamily: tj.fontSerif, fontStyle: "italic" }}>
              the real collection target
            </div>
          </Card>

          <Card accent={tj.gray500} accentSide="left" padding={20}>
            <Eyebrow color={tj.gray700}>Already Handled</Eyebrow>
            <div style={{ fontFamily: tj.fontSerif, fontSize: 32, fontWeight: 700, color: tj.gray700, marginTop: 6, letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>
              {fmtFull(handledTotal)}
            </div>
            <div style={{ fontSize: 11, color: tj.gray500, marginTop: 4, fontFamily: tj.fontSerif, fontStyle: "italic" }}>
              litigation / collections / closed
            </div>
          </Card>
        </div>

        {/* AGING BAR — visual representation of where the money sits */}
        <Card padding="20px 24px" style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <Eyebrow>Aging Composition · workable AR only</Eyebrow>
            <div style={{ fontSize: 11, color: tj.gray500, fontFamily: tj.fontSerif, fontStyle: "italic" }}>
              {handledBuckets.litigation + handledBuckets.collections + handledBuckets.writeoff > 0 ? (
                <>
                  Excludes {fmtFull(handledBuckets.litigation + handledBuckets.collections + handledBuckets.writeoff)} already handled
                  {handledBuckets.litigation > 0 && <> · {fmtFull(handledBuckets.litigation)} litigation</>}
                  {handledBuckets.collections > 0 && <> · {fmtFull(handledBuckets.collections)} collections</>}
                  {handledBuckets.writeoff > 0 && <> · {fmtFull(handledBuckets.writeoff)} write-off</>}
                </>
              ) : (
                <>All AR currently workable</>
              )}
            </div>
          </div>
          <div style={{ display: "flex", height: 36, border: `1px solid ${tj.border}` }}>
            {[
              { lab: "Current", val: bucketTotals.current, color: tj.ok },
              { lab: "1-30",    val: bucketTotals.d30,     color: tj.sky },
              { lab: "31-60",   val: bucketTotals.d60,     color: tj.warn },
              { lab: "61-90",   val: bucketTotals.d90,     color: "#D4692A" },
              { lab: ">90",     val: bucketTotals.over90,  color: tj.crimson },
            ].map((b, bi) => {
              const total = Object.values(bucketTotals).reduce((s, v) => s + v, 0) || 1;
              const pct = (b.val / total) * 100;
              return (
                <div key={bi} title={`${b.lab}: ${fmtFull(b.val)} (${pct.toFixed(1)}%)`}
                     style={{ flex: b.val, background: b.color, opacity: 0.88, minWidth: 2,
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontFamily: tj.fontMono, fontSize: 11, fontWeight: 700, color: "#fff",
                              borderRight: bi < 4 ? `1px solid ${tj.white}` : "none" }}>
                  {pct > 8 && `${pct.toFixed(0)}%`}
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 10, color: tj.gray700, letterSpacing: "0.06em", fontFamily: tj.fontSans, flexWrap: "wrap", gap: 8 }}>
            <span>● Current {fmt(bucketTotals.current)}</span>
            <span>● 1-30d {fmt(bucketTotals.d30)}</span>
            <span>● 31-60d {fmt(bucketTotals.d60)}</span>
            <span>● 61-90d {fmt(bucketTotals.d90)}</span>
            <span>● &gt;90d {fmt(bucketTotals.over90)}</span>
          </div>
        </Card>

        {/* TABS */}
        <div style={{ display: "flex", borderBottom: `1px solid ${tj.border}`, marginBottom: 24, flexWrap: "wrap" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setView(t.id)} style={{
              background: "transparent", border: "none",
              borderBottom: `2px solid ${view === t.id ? tj.crimson : "transparent"}`,
              padding: "10px 2px", marginRight: 28,
              fontFamily: tj.fontSans, fontSize: 13, fontWeight: 700,
              letterSpacing: "0.1em", textTransform: "uppercase",
              color: view === t.id ? tj.navy900 : tj.gray700, cursor: "pointer",
            }}>{t.label}</button>
          ))}
        </div>

        {/* ═══ ACTION PRIORITIES ═══ */}
        {view === "priorities" && (
          <div>
            {/* Top 10 call list */}
            <Card accent={tj.navy900} padding={28} style={{ marginBottom: 24 }}>
              <Eyebrow style={{ marginBottom: 6 }}>This week's call list · top 10 by priority</Eyebrow>
              <div style={{ fontSize: 12, color: tj.gray700, fontStyle: "italic", fontFamily: tj.fontSerif, marginBottom: 16 }}>
                Ranked by expected recovery value × urgency. Work this list from top down.
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr>
                    {["#", "Customer", "Total", ">90 Days", "Action", "Rationale"].map((h, hi) => (
                      <th key={hi} style={{
                        textAlign: hi === 2 || hi === 3 ? "right" : "left",
                        padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}`,
                        fontFamily: tj.fontSans, fontSize: 10, textTransform: "uppercase",
                        letterSpacing: "0.1em", color: tj.gray700, fontWeight: 700,
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {actionable.map((r, ri) => {
                    const meta = BUCKETS[r.bucket];
                    return (
                      <tr key={ri} style={{ borderBottom: `1px solid ${tj.border}` }}>
                        <td style={{ padding: "12px 8px", fontFamily: tj.fontSerif, fontSize: 18, fontWeight: 700, color: tj.crimson, width: 30 }}>{ri + 1}</td>
                        <td style={{ padding: "12px 8px", fontWeight: 700, color: tj.navy900, maxWidth: 260 }}>{r.name}</td>
                        <td style={{ padding: "12px 8px", textAlign: "right", fontFamily: tj.fontMono, fontWeight: 700 }}>{fmtFull(r.total)}</td>
                        <td style={{ padding: "12px 8px", textAlign: "right", fontFamily: tj.fontMono, color: r.over90 > 0 ? tj.crimson : tj.gray500 }}>{fmtFull(r.over90 + r.d90)}</td>
                        <td style={{ padding: "12px 8px" }}>
                          <span style={{
                            background: meta.bg, color: meta.color,
                            padding: "3px 10px", fontSize: 9, fontWeight: 700,
                            letterSpacing: "0.08em", textTransform: "uppercase",
                            whiteSpace: "nowrap", fontFamily: tj.fontSans,
                          }}>{meta.label}</span>
                        </td>
                        <td style={{ padding: "12px 8px", fontSize: 12, color: tj.gray700, fontFamily: tj.fontSerif, fontStyle: "italic", maxWidth: 380 }}>{r.reason}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </Card>

            {/* All bucket sections */}
            {Object.entries(BUCKETS)
              .sort(([,a], [,b]) => a.rank - b.rank)
              .filter(([k]) => k !== "NOACTION" && byBucket[k].length > 0)
              .map(([k]) => (
                <BucketSection
                  key={k}
                  bucket={k}
                  rows={byBucket[k]}
                  expanded={expanded[k]}
                  onToggle={() => setExpanded({ ...expanded, [k]: !expanded[k] })}
                />
              ))}
          </div>
        )}

        {/* ═══ AGING VIEW ═══ */}
        {view === "aging" && (
          <Card padding={24}>
            <Eyebrow style={{ marginBottom: 16 }}>All customers · sorted by &gt;90 day exposure</Eyebrow>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr>
                    {["Customer", "Current", "1-30", "31-60", "61-90", ">90", "Total", "Status", "Updated"].map((h, hi) => (
                      <th key={hi} style={{
                        textAlign: hi === 0 || hi === 7 ? "left" : "right",
                        padding: "8px 8px", borderBottom: `2px solid ${tj.navy900}`,
                        fontFamily: tj.fontSans, fontSize: 10, textTransform: "uppercase",
                        letterSpacing: "0.1em", color: tj.gray700, fontWeight: 700,
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {AR.rows
                    .map((r, originalIdx) => ({ ...r, originalIdx, ...classifyRow(r) }))
                    .filter(r => r.total > 0)
                    .sort((a, b) => (b.over90 + b.d90) - (a.over90 + a.d90) || b.total - a.total)
                    .map((r, ri) => {
                      const meta = BUCKETS[r.bucket];
                      const strikeCount = (r.strikes || []).length;
                      const atLimit = strikeCount >= STRIKE_LIMIT;
                      return (
                        <tr key={ri} style={{
                          borderBottom: `1px solid ${tj.border}`,
                          background: atLimit ? tj.badBg : "transparent",
                        }}>
                          <td style={{ padding: "8px", fontWeight: 700, color: tj.navy900, maxWidth: 280 }}>
                            <span style={{ display: "inline-flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                              <span>{r.name}</span>
                              <StrikeMark
                                row={r}
                                rowIdx={r.originalIdx}
                                onAdd={(note) => addStrike(r.originalIdx, note)}
                                onRemove={(sIdx) => removeStrike(r.originalIdx, sIdx)}
                                compact
                              />
                            </span>
                          </td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, color: r.current > 0 ? tj.ink : tj.gray500 }}>{fmtFull(r.current)}</td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, color: r.d30 > 0 ? tj.ink : tj.gray500 }}>{fmtFull(r.d30)}</td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, color: r.d60 > 0 ? tj.warn : tj.gray500 }}>{fmtFull(r.d60)}</td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, color: r.d90 > 0 ? tj.warn : tj.gray500 }}>{fmtFull(r.d90)}</td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, color: r.over90 > 0 ? tj.crimson : tj.gray500, fontWeight: r.over90 > 0 ? 700 : 400 }}>{fmtFull(r.over90)}</td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, fontWeight: 700 }}>{fmtFull(r.total)}</td>
                          <td style={{ padding: "8px" }}>
                            <span style={{
                              background: meta.bg, color: meta.color,
                              padding: "2px 8px", fontSize: 9, fontWeight: 700,
                              letterSpacing: "0.08em", textTransform: "uppercase",
                              whiteSpace: "nowrap", fontFamily: tj.fontSans,
                            }}>{meta.label.split(" ·")[0]}</span>
                          </td>
                          <td style={{ padding: "8px", textAlign: "right", fontFamily: tj.fontMono, fontSize: 10, color: tj.gray500, whiteSpace: "nowrap" }}>
                            {r.lastUpdated ? shortDate(r.lastUpdated) : "—"}
                          </td>
                        </tr>
                      );
                    })}
                </tbody>
              </table>
            </div>
          </Card>
        )}

        {/* ═══ ALL CUSTOMERS ═══ */}
        {view === "all" && (
          <Card padding={24}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 10, flexWrap: "wrap", gap: 10 }}>
              <div>
                <Eyebrow>Every customer · editable master</Eyebrow>
                <div style={{ fontFamily: tj.fontSerif, fontSize: 12, color: tj.gray700, fontStyle: "italic", marginTop: 4, lineHeight: 1.6 }}>
                  Click any cell to edit. Total auto-recalculates from the aging buckets.<br />
                  Edits flow through to Action Priorities and Aging View. CSV uploads merge and preserve your edits.
                </div>
              </div>
              <button onClick={addRow} style={{
                background: tj.navy900, color: tj.white, border: "none",
                padding: "10px 18px", fontSize: 11, fontWeight: 700, cursor: "pointer",
                letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: tj.fontSans,
              }}>+ Add Customer</button>
            </div>

            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr>
                    {["Customer", "Current", "1-30", "31-60", "61-90", ">90", "Total", "Status", "Notes", "Updated", ""].map((h, hi) => (
                      <th key={hi} style={{
                        textAlign: hi === 0 || hi === 7 || hi === 8 ? "left" : hi === 10 ? "center" : "right",
                        padding: "8px", borderBottom: `2px solid ${tj.navy900}`,
                        fontFamily: tj.fontSans, fontSize: 10, textTransform: "uppercase",
                        letterSpacing: "0.1em", color: tj.gray700, fontWeight: 700,
                        whiteSpace: "nowrap",
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {/* Build sorted view with original-row-index preserved so edits
                      target the correct row in AR.rows regardless of sort order. */}
                  {AR.rows
                    .map((r, originalIdx) => ({ ...r, originalIdx, classify: classifyRow(r) }))
                    .slice()
                    .sort((a, b) => a.name.localeCompare(b.name))
                    .map(r => {
                      const i = r.originalIdx;
                      const isManual = r.manuallyAdded;
                      const strikeCount = (r.strikes || []).length;
                      const atLimit = strikeCount >= STRIKE_LIMIT;
                      return (
                        <tr key={i} style={{
                          borderBottom: `1px solid ${tj.border}`,
                          background: atLimit ? tj.badBg : (isManual ? tj.surfaceCream : "transparent"),
                        }}>
                          {/* Customer name */}
                          <td style={{ padding: "6px 8px", fontWeight: 700, color: tj.navy900, maxWidth: 300, fontFamily: tj.fontSans }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                              <EditableCell
                                value={r.name}
                                onSave={v => updateRow(i, "name", v)}
                                style={{ fontWeight: 700, color: tj.navy900 }}
                              />
                              <StrikeMark
                                row={r}
                                rowIdx={i}
                                onAdd={(note) => addStrike(i, note)}
                                onRemove={(sIdx) => removeStrike(i, sIdx)}
                                compact
                              />
                              {isManual && (
                                <span title="Manually added (not in CSV)" style={{ fontSize: 8, color: tj.crimson, letterSpacing: "0.1em", fontWeight: 700 }}>
                                  MANUAL
                                </span>
                              )}
                            </div>
                          </td>
                          {/* Aging buckets */}
                          {["current", "d30", "d60", "d90", "over90"].map(field => {
                            const val = r[field] || 0;
                            const color = field === "over90"
                              ? (val > 0 ? tj.crimson : tj.gray500)
                              : (field === "d60" || field === "d90")
                                ? (val > 0 ? tj.warn : tj.gray500)
                                : (val !== 0 ? tj.ink : tj.gray500);
                            return (
                              <td key={field} style={{
                                padding: "6px 8px", textAlign: "right", fontFamily: tj.fontMono, color,
                                fontWeight: field === "over90" && val > 0 ? 700 : 400,
                              }}>
                                <EditableCell
                                  value={val}
                                  numeric
                                  align="right"
                                  onSave={v => updateRow(i, field, v)}
                                  display={fmtFull(val)}
                                />
                              </td>
                            );
                          })}
                          {/* Total (auto-computed, but still allow override) */}
                          <td style={{
                            padding: "6px 8px", textAlign: "right", fontFamily: tj.fontMono,
                            fontWeight: 700, color: tj.navy900,
                            background: tj.gray50,
                          }}>
                            <span title="Auto-calculated from aging buckets">{fmtFull(r.total)}</span>
                          </td>
                          {/* Status — manual override dropdown + history */}
                          <td style={{ padding: "6px 8px", whiteSpace: "nowrap" }}>
                            <StatusControl
                              row={r}
                              currentBucket={r.classify.bucket}
                              onSetStatus={(b, reason) => setRowStatus(i, b, reason)}
                              compact
                            />
                          </td>
                          {/* Notes */}
                          <td style={{ padding: "6px 8px", fontSize: 11, color: tj.gray700, fontStyle: r.note ? "italic" : "normal", fontFamily: tj.fontSerif, maxWidth: 280 }}>
                            <EditableCell
                              value={r.note || ""}
                              onSave={v => updateRow(i, "note", v)}
                              placeholder="add note…"
                              style={{ fontStyle: r.note ? "italic" : "normal", color: r.note ? tj.gray700 : tj.gray500 }}
                            />
                          </td>
                          {/* Updated date */}
                          <td style={{ padding: "6px 8px", textAlign: "right", fontFamily: tj.fontMono, fontSize: 10, color: tj.gray500, whiteSpace: "nowrap" }}>
                            {r.lastUpdated ? (
                              <span title={new Date(r.lastUpdated).toLocaleString("en-US")}>
                                {shortDate(r.lastUpdated)}
                              </span>
                            ) : "—"}
                          </td>
                          {/* Delete */}
                          <td style={{ padding: "6px 4px", textAlign: "center", width: 24 }}>
                            <button
                              onClick={() => deleteRow(i)}
                              title="Delete row"
                              style={{
                                background: "transparent", border: "none", cursor: "pointer",
                                color: tj.gray500, fontSize: 16, padding: 2, lineHeight: 1,
                              }}
                              onMouseEnter={e => e.currentTarget.style.color = tj.crimson}
                              onMouseLeave={e => e.currentTarget.style.color = tj.gray500}
                            >×</button>
                          </td>
                        </tr>
                      );
                    })}
                </tbody>
                <tfoot>
                  <tr style={{ borderTop: `2px solid ${tj.navy900}` }}>
                    <td style={{ padding: "10px 8px", fontWeight: 700, color: tj.navy900, fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", fontFamily: tj.fontSans }}>
                      Total · {AR.rows.filter(r => r.total > 0 || r.total < 0).length} accounts
                    </td>
                    {["current", "d30", "d60", "d90", "over90", "total"].map(field => {
                      const sum = AR.rows.reduce((s, r) => s + (r[field] || 0), 0);
                      return (
                        <td key={field} style={{
                          padding: "10px 8px", textAlign: "right", fontFamily: tj.fontMono,
                          fontWeight: 700, color: tj.navy900,
                          background: field === "total" ? tj.gray50 : "transparent",
                        }}>
                          {fmtFull(sum)}
                        </td>
                      );
                    })}
                    <td colSpan={4} />
                  </tr>
                </tfoot>
              </table>
            </div>

            <div style={{ marginTop: 16, paddingTop: 12, borderTop: `1px solid ${tj.border}`, fontSize: 11, color: tj.gray500, fontStyle: "italic", fontFamily: tj.fontSerif, lineHeight: 1.6 }}>
              <b style={{ color: tj.navy900, fontStyle: "normal" }}>How this behaves:</b> Editing any bucket amount auto-updates the Total. Click a Status chip to override the auto-classification (with optional note) — manual overrides are marked with a dot (●) and survive CSV uploads. The ⌛ icon shows a row's status history. On CSV upload, if a row's aged dollars drop by more than 50%, the manual status auto-clears and the transition is logged. The &quot;Updated&quot; date is stamped automatically whenever you edit a row.
            </div>
          </Card>
        )}

        {/* FOOTER */}
        <div style={{ marginTop: 36, paddingTop: 18, borderTop: `1px solid ${tj.border}`, fontSize: 11,
                      color: tj.gray500, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12, letterSpacing: "0.04em" }}>
          <span>AR Aging: {AR.source} · {classified.length} customers · Workable: {fmtFull(workableTotal)}</span>
          <span style={{ fontStyle: "italic", fontFamily: tj.fontSerif }}>Call the right name first.</span>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
