function parseXLSX(buffer) {
 try {
 const wb = XLSX.read(new Uint8Array(buffer), { type: "array" });
 const conName = wb.SheetNames.find(n => /consol/i.test(n)) || wb.SheetNames[0];
 const raw = XLSX.utils.sheet_to_json(wb.Sheets[conName], { header: 1, defval: 0 });
 if (raw.length < 50) return null;
 let monthRow = -1;
 for (let r = 0; r < 10; r++) {
 const hits = (raw[r] || []).filter(c => typeof c === "string" && /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+2\d$/i.test(String(c).trim()));
 if (hits.length >= 6) { monthRow = r; break; }
 }
 if (monthRow < 0) return null;
 const monthCols = [];
 for (let c = 0; c < (raw[monthRow] || []).length; c++) {
 const v = String(raw[monthRow][c] || "").trim();
 if (/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+2\d$/i.test(v)) monthCols.push({ col: c, label: v });
 }
 const last12 = monthCols.slice(-12);
 const months = last12.map(m => m.label);
 const shortMo = months.map(m => m.split(" ")[0]);
 const cols = last12.map(m => m.col);
 const findRow = (search, from = 0) => {
 const s = search.toLowerCase();
 for (let r = from; r < raw.length; r++)
 for (let c = 0; c < Math.min(8, (raw[r] || []).length); c++)
 if (String(raw[r][c] || "").trim().toLowerCase().includes(s)) return r;
 return -1;
 };
 const getVals = (rowIdx) => rowIdx < 0 || !raw[rowIdx] ? cols.map(() => 0) :
 cols.map(c => { const v = raw[rowIdx]?.[c]; return typeof v === "number" ? v : parseFloat(String(v || "0").replace(/[$,()]/g, "")) || 0; });
 const gpRow = findRow("Gross Profit");
 const result = {
 months, shortMo,
 revenue: getVals(findRow("Total Income")),
 grossProfit: getVals(gpRow),
 ebitda: getVals(findRow("EBITDA")),
 adjEbitda: getVals(findRow("Adjusted EBITDA")),
 ttmEbitda: getVals(findRow("TTM EBITDA")),
 fixedCosts: getVals(findRow("Total Total Fixed Cost")),
 variableCosts: getVals(findRow("Total Total Variable Cost")),
 labor: getVals(findRow("641202")),
 netIncome: getVals(findRow("Net Income", Math.max(0, gpRow))),
 interest: getVals(findRow("Total 6605")),
 liquid: getVals(findRow("Total 6001")),
 solids: getVals(findRow("Total 6002")),
 skimOil: getVals(findRow("Total 6003")),
 washout: getVals(findRow("Total 6004")),
 source: `Uploaded P&L (${months[months.length - 1]})`,
 uploadedAt: new Date().toISOString(),
 };
 for (const [key, search] of [["bigLake", "Big Lake"], ["gonzalez", "Gonzal"], ["liveOak", "Live Oak"]]) {
 const sn = wb.SheetNames.find(n => new RegExp(search, "i").test(n));
 if (!sn) { result[key] = { rev: cols.map(() => 0), ni: cols.map(() => 0) }; continue; }
 const lraw = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: 0 });
 const lCols = [];
 for (let r = 0; r < 10; r++) {
 for (let c = 0; c < (lraw[r] || []).length; c++)
 if (typeof lraw[r][c] === "string" && /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+2\d$/i.test(lraw[r][c].trim())) lCols.push(c);
 if (lCols.length >= 6) break;
 }
 const ll12 = lCols.slice(-12);
 const lFind = (s, from = 0) => { for (let r = from; r < lraw.length; r++) for (let c = 0; c < 8; c++) if (String(lraw[r]?.[c] || "").toLowerCase().includes(s.toLowerCase())) return r; return -1; };
 const lVals = (ri) => ri < 0 ? ll12.map(() => 0) : ll12.map(c => typeof lraw[ri]?.[c] === "number" ? lraw[ri][c] : 0);
 const revR = lFind("Total Income");
 const niR = lFind("Net Income", Math.max(0, lFind("Gross Profit")));
 result[key] = { rev: lVals(revR), ni: lVals(niR) };
 }
 return result;
 } catch (e) { console.error("XLSX parse error:", e); return null; }
}

function parseNum(s) {
 if (!s || typeof s !== "string") return 0;
 s = s.trim().replace(/[$,\s]/g, "");
 if (s === "-" || s === "" || s === "n/a" || s.includes("DIV")) return 0;
 const neg = s.startsWith("(") && s.endsWith(")");
 if (neg) s = s.slice(1, -1);
 const n = parseFloat(s);
 return isNaN(n) ? 0 : neg ? -n : n;
}

function parseCSV(text) {
 const rows = [];
 let cur = "", inQ = false;
 for (const ch of text) {
 if (ch === '"') { inQ = !inQ; cur += ch; }
 else if (ch === '\n' && !inQ) { rows.push(cur); cur = ""; }
 else cur += ch;
 }
 if (cur.trim()) rows.push(cur);
 return rows.map(r => {
 const f = []; let field = "", q = false;
 for (const ch of r.replace(/\r/g, "")) {
 if (ch === '"') q = !q;
 else if (ch === "," && !q) { f.push(field.trim()); field = ""; }
 else field += ch;
 }
 f.push(field.trim());
 return f;
 });
}

function extractWeekly(csvText) {
 const rows = parseCSV(csvText);
 if (rows.length < 10) return null;
 let dates = [], dayNames = [], updatedThru = "";
 const dp = /\d{1,2}-[A-Za-z]{3}/;
 for (let i = 0; i < 12; i++) {
 const r = rows[i];
 if (r && r.filter(c => dp.test(c)).length >= 3) {
 for (let c = 3; c < 22; c += 3) if (dp.test(r[c])) dates.push(r[c].trim());
 break;
 }
 }
 for (let i = 0; i < 8; i++) {
 const r = rows[i] || [];
 for (let c = 3; c < 22; c += 3)
 if (/Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday/i.test(r[c]))
 dayNames.push(r[c].trim());
 }
 for (let i = 0; i < 5; i++)
 if (rows[i]?.[0] && /updated/i.test(rows[i][0]))
 updatedThru = rows[i][0].replace(/Updated thru\s*/i, "").trim();
 const locNames = ["Big Lake", "Gonzales", "Gonzalez", "Live Oak"];
 const locations = [];
 for (let i = 0; i < rows.length; i++) {
 const r = rows[i];
 if (!r?.[0]) continue;
 const lm = locNames.find(n => r[0].trim().toLowerCase().includes(n.toLowerCase()));
 if (!lm) continue;
 const ln = lm === "Gonzales" ? "Gonzalez" : lm;
 const loc = { name: ln };
 const fields = ["water", "solids", "solidsRev", "washouts", "oilSold", "totalRevenue", "laborCost", "overhead", "pl"];
 fields.forEach(f => { loc[f] = { daily: [], weekTotal: 0, mtd: 0 }; });
 for (let d = 0; d < 7; d++) {
 const b = 3 + d * 3;
 loc.water.daily.push({ day: parseNum(r[b]), night: parseNum(r[b + 1]), total: parseNum(r[b + 2]) });
 }
 loc.water.weekTotal = parseNum(r[24]);
 loc.water.mtd = parseNum(r[27]);
 for (let j = i + 1; j < Math.min(i + 15, rows.length); j++) {
 const sr = rows[j];
 if (!sr?.[1]) continue;
 const lb = sr[1].trim().toLowerCase();
 let t = null;
 if (lb.includes("solids") && lb.includes("revenue")) t = loc.solidsRev;
 else if (lb.includes("solid")) t = loc.solids;
 else if (lb.includes("washout")) t = loc.washouts;
 else if (lb.includes("oil sold")) t = loc.oilSold;
 else if (lb.includes("total revenue")) t = loc.totalRevenue;
 else if (lb.includes("labor")) t = loc.laborCost;
 else if (lb.includes("facility") || lb.includes("overhead")) t = loc.overhead;
 else if (lb === "p/l") t = loc.pl;
 if (t) {
 t.daily = [];
 for (let d = 0; d < 7; d++) {
 const b = 3 + d * 3;
 t.daily.push({ day: parseNum(sr[b]), night: parseNum(sr[b + 1]), total: parseNum(sr[b + 2]) });
 }
 t.weekTotal = parseNum(sr[24]);
 t.mtd = parseNum(sr[27]);
 }
 if (sr[0]?.trim() && locNames.some(n => sr[0].trim().toLowerCase().includes(n.toLowerCase()))) break;
 if (lb === "p/l") break;
 }
 locations.push(loc);
 }
 return { dates, dayNames, updatedThru, locations, uploadedAt: new Date().toISOString() };
}

const fmt = (n) => { if (Math.abs(n) >= 1e6) return `$${(n / 1e6).toFixed(1)}M`; if (Math.abs(n) >= 1000) return `$${(n / 1000).toFixed(0)}K`; return `$${n.toFixed(0)}`; };
const fmtF = (n) => { if (n === 0) return "—"; const s = `$${Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 })}`; return n < 0 ? `(${s})` : s; };
const pct = (n) => `${(n * 100).toFixed(1)}%`;
const pctD = (a, b) => b === 0 ? "—" : `${((a / b) * 100).toFixed(1)}%`;
const fmtV = (n) => n === 0 ? "—" : n.toLocaleString("en-US", { maximumFractionDigits: 0 });

function timeAgo(iso) {
 if (!iso) return "never";
 const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
 if (sec < 60) return "just now";
 if (sec < 3600) return `${Math.floor(sec / 60)} min ago`;
 if (sec < 86400) return `${Math.floor(sec / 3600)} hr ago`;
 const days = Math.floor(sec / 86400);
 if (days < 30) return `${days}d ago`;
 return `${Math.floor(days / 30)}mo ago`;
}

function ageDays(iso) { if (!iso) return null; return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); }

function Eyebrow({ children, color, style }) {
 return (
 <div style={{
 fontFamily: tj.fontSans, fontSize: 11, letterSpacing: "0.12em",
 textTransform: "uppercase", fontWeight: 700, color: color || tj.sky, ...style,
 }}>{children}</div>
 );
}

function Card({ children, accent, accentSide = "top", cream, style, padding = 24 }) {
 const accentBorder = accent ? { [`border${accentSide === "top" ? "Top" : "Left"}`]: `3px solid ${accent}` } : {};
 return (
 <div style={{
 background: cream ? tj.surfaceCream : tj.surface,
 border: `1px solid ${tj.border}`,
 padding,
 boxShadow: "0 2px 8px rgba(0, 32, 96, 0.08)",
 ...accentBorder, ...style,
 }}>{children}</div>
 );
}

function Btn({ children, primary, accent, onClick, style }) {
 const base = {
 fontFamily: tj.fontSans, fontSize: 11, fontWeight: 700,
 letterSpacing: "0.08em", textTransform: "uppercase",
 padding: "9px 16px", border: `1px solid ${tj.navy900}`,
 cursor: "pointer", transition: "all 150ms ease", borderRadius: 4,
 };
 const variant = primary ? { background: tj.navy900, color: "#fff" }
 : accent ? { background: tj.crimson, color: "#fff", borderColor: tj.crimson }
 : { background: "transparent", color: tj.navy900 };
 return <button onClick={onClick} style={{ ...base, ...variant, ...style }}>{children}</button>;
}

function Spark({ data, color = tj.navy900, height: h = 32, width: w = 120 }) {
 if (!data || data.length < 2) return null;
 const mn = Math.min(...data), mx = Math.max(...data), rng = mx - mn || 1;
 const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - mn) / rng) * (h - 4) - 2}`).join(" ");
 return (
 <svg width={w} height={h} style={{ display: "block" }}>
 <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
 <circle cx={w} cy={parseFloat(pts.split(" ").pop().split(",")[1])} r="2.5" fill={color} />
 </svg>
 );
}

function Bars({ data, labels, height: h = 140, colorFn, width: w = 300 }) {
 if (!data || data.length === 0) return null;
 const mx = Math.max(...data.map(Math.abs), 1);
 const hasNeg = data.some(d => d < 0);
 const bw = Math.min(28, (w - 20) / data.length - 4);
 const chartH = hasNeg ? h * 0.6 : h - 20;
 const negH = hasNeg ? h * 0.35 : 0;
 const bl = chartH;
 return (
 <svg width={w} height={h + 24} style={{ display: "block" }}>
 {data.map((v, i) => {
 const x = i * ((w - 20) / data.length) + 10;
 const barH = (Math.abs(v) / mx) * (v >= 0 ? chartH : negH);
 const y = v >= 0 ? bl - barH : bl;
 const c = colorFn ? colorFn(v) : v >= 0 ? tj.ok : tj.crimson;
 return (
 <g key={i}>
 <rect x={x} y={y} width={bw} height={Math.max(barH, 1)} fill={c} opacity={0.85} />
 {labels && <text x={x + bw / 2} y={h + 16} textAnchor="middle" fontSize="9" fill={tj.gray700} fontFamily={tj.fontSans} letterSpacing="0.06em">{labels[i]}</text>}
 </g>
 );
 })}
 <line x1={8} y1={bl} x2={w - 8} y2={bl} stroke={tj.navy900} strokeWidth="1" />
 </svg>
 );
}

function ScoreRow({ label, value, target, status, trend, sparkData, sparkColor, sub }) {
 const statusColor = { green: tj.ok, red: tj.crimson, yellow: tj.warn }[status];
 const arrows = { up: "▲", down: "▼", flat: "—" };
 const arrowColor = { up: tj.ok, down: tj.crimson, flat: tj.gray500 }[trend];
 return (
 <div style={{ display: "flex", alignItems: "center", padding: "14px 0", borderBottom: `1px solid ${tj.border}`, gap: 12 }}>
 <div style={{ width: 8, height: 8, borderRadius: "50%", background: statusColor, flexShrink: 0 }} />
 <div style={{ flex: 1, minWidth: 0 }}>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 15, color: tj.navy900, fontWeight: 700 }}>{label}</div>
 {sub && <div style={{ fontSize: 11, color: tj.gray500, marginTop: 2, fontStyle: "italic", fontFamily: tj.fontSerif }}>{sub}</div>}

 </div>
 <div style={{ fontSize: 12, color: arrowColor, width: 20, textAlign: "center" }}>{arrows[trend]}</div>
 {sparkData && <Spark data={sparkData} color={sparkColor || statusColor} />}
 </div>
 );
}

function StalenessBanner({ monthlyAge, weeklyAge, onDismiss, dismissed }) {
 if (dismissed) return null;
 const monthlyStale = monthlyAge !== null && monthlyAge > 35;
 const weeklyStale = weeklyAge !== null && weeklyAge > 10;
 const monthlyMissing = monthlyAge === null;
 const weeklyMissing = weeklyAge === null;
 if (!monthlyStale && !weeklyStale && !monthlyMissing && !weeklyMissing) return null;
 const warnings = [];
 if (monthlyMissing) warnings.push("P&L: showing pre-loaded sample data (not your live numbers)");
 else if (monthlyStale) warnings.push(`P&L data is ${monthlyAge} days old`);
 if (weeklyMissing) warnings.push("Weekly ops: no file loaded");
 else if (weeklyStale) warnings.push(`Weekly ops is ${weeklyAge} days old`);
 return (
 <Card accent={tj.warn} padding="12px 16px" style={{ background: tj.warnBg, marginBottom: 16, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
 <div style={{ flex: 1, minWidth: 200 }}>
 <Eyebrow color={tj.warn}>Stale Data</Eyebrow>
 <div style={{ fontSize: 12, color: tj.ink, marginTop: 2 }}>{warnings.join(" · ")}</div>
 </div>
 <Btn onClick={onDismiss}>Dismiss</Btn>
 </Card>
 );
}

 const mergeIntoArchive = (snap) => {
 setArchive(prev => {
 const idx = prev.findIndex(a => a.kind === snap.kind && a.reportDate === snap.reportDate);
 let next;
 if (idx >= 0) {
 const existing = prev[idx];
 next = [...prev];
 next[idx] = { ...snap, updateCount: (existing.updateCount || 1) + 1 };
 } else {
 next = [...prev, snap];
 }
 next.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
 (async () => { try { await window.storage.set("tejas-coo-archive", JSON.stringify(next)); } catch (e) {} })();
 return next;
 });
 };

 const deleteArchiveEntry = (reportDate, kind) => {
 setArchive(prev => {
 const next = prev.filter(a => !(a.reportDate === reportDate && a.kind === kind));
 (async () => { try { await window.storage.set("tejas-coo-archive", JSON.stringify(next)); } catch (e) {} })();
 return next;
 });
 };

 { l: "Week Revenue", v: fmtF(wR), c: wR > 100000 ? tj.ok : tj.warn },
 { l: "Week P&L", v: fmtF(wP), c: wP >= 0 ? tj.ok : tj.crimson },
 { l: "Week Margin", v: pctD(wP, wR), c: wP >= 0 ? tj.ok : tj.crimson },
 { l: "MTD Revenue", v: fmtF(wMR), c: tj.navy900 },
 { l: "MTD P&L", v: fmtF(wMP), c: wMP >= 0 ? tj.ok : tj.crimson },
 ].map((k, idx) => (
 <div key={idx} style={{ flex: "1 1 140px", padding: "16px 20px", borderLeft: idx ? `1px solid ${tj.border}` : "none" }}>
 <Eyebrow color={tj.gray700} style={{ marginBottom: 6 }}>{k.l}</Eyebrow>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 26, fontWeight: 700, color: k.c, fontVariantNumeric: "tabular-nums" }}>{k.v}</div>
 </div>
 ))}
 </Card>

 <Card padding={24} style={{ marginBottom: 16 }}>
 <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
 <Eyebrow>Daily P&amp;L · all locations</Eyebrow>
 <span style={{ fontSize: 11, color: tj.gray500, fontFamily: tj.fontMono }}>{W.dates?.[0]} → {W.dates?.[W.dates.length - 1]}</span>
 </div>
 <Bars data={W.locations[0]?.pl.daily.map((_, di) => W.locations.reduce((s, l) => s + (l.pl.daily[di]?.total || 0), 0)) || []} labels={W.dates?.map(d => d.replace(/-.*/, ""))} width={500} height={120} />
 <div style={{ display: "flex", gap: 24, marginTop: 14, paddingTop: 12, borderTop: `1px solid ${tj.border}` }}>
 <div style={{ fontSize: 12, color: tj.gray700 }}>Labor: <b style={{ color: tj.warn, fontFamily: tj.fontMono }}>{fmtF(Math.abs(W.locations.reduce((s, l) => s + l.laborCost.weekTotal, 0)))}</b></div>
 <div style={{ fontSize: 12, color: tj.gray700 }}>Overhead: <b style={{ color: tj.warn, fontFamily: tj.fontMono }}>{fmtF(Math.abs(W.locations.reduce((s, l) => s + l.overhead.weekTotal, 0)))}</b></div>
 </div>
 </Card>

 <Card padding={24} style={{ marginBottom: 16 }}>
 <Eyebrow style={{ marginBottom: 16 }}>Weekly volumes</Eyebrow>
 <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
 {[
 { l: "Water", v: W.locations.reduce((s, l) => s + l.water.weekTotal, 0), u: "bbl", c: tj.sky },
 { l: "Solids", v: W.locations.reduce((s, l) => s + l.solids.weekTotal, 0), u: "bbl", c: tj.navy900 },
 { l: "Skim Oil", v: W.locations.reduce((s, l) => s + l.oilSold.weekTotal, 0), u: "bbl", c: tj.warn },
 { l: "Washouts", v: W.locations.reduce((s, l) => s + l.washouts.weekTotal, 0), u: "jobs", c: tj.crimson },
 ].map((x, xi) => (
 <div key={xi} style={{ flex: "1 1 100px" }}>
 <Eyebrow color={tj.gray500} style={{ fontSize: 10 }}>{x.l}</Eyebrow>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 26, fontWeight: 700, color: x.c, marginTop: 4, fontVariantNumeric: "tabular-nums" }}>{fmtV(x.v)}</div>
 <div style={{ fontSize: 11, color: tj.gray500, fontStyle: "italic", fontFamily: tj.fontSerif }}>{x.u}</div>
 </div>
 ))}
 </div>
 </Card>

 <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
 {W.locations.map((loc, li) => {
 const wk = loc.totalRevenue.weekTotal;
 const pl = loc.pl.weekTotal;
 const st = pl > 0 ? tj.ok : pl > -5000 ? tj.warn : tj.crimson;
 return (
 <Card key={li} accent={st} accentSide="left" padding={18} style={{ flex: "1 1 260px", minWidth: 240 }}>
 <Eyebrow color={st}>{loc.name}</Eyebrow>
 <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 12, marginBottom: 12 }}>
 <div><div style={{ fontSize: 9, color: tj.gray500, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700 }}>Week Rev</div><div style={{ fontFamily: tj.fontMono, fontSize: 14, fontWeight: 700, color: tj.navy900 }}>{fmtF(wk)}</div></div>
 <div><div style={{ fontSize: 9, color: tj.gray500, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700 }}>Week P/L</div><div style={{ fontFamily: tj.fontMono, fontSize: 14, fontWeight: 700, color: pl >= 0 ? tj.ok : tj.crimson }}>{fmtF(pl)}</div></div>
 <div><div style={{ fontSize: 9, color: tj.gray500, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700 }}>Margin</div><div style={{ fontFamily: tj.fontMono, fontSize: 14, fontWeight: 700, color: pl >= 0 ? tj.ok : tj.crimson }}>{pctD(pl, wk)}</div></div>
 </div>
 <Bars data={loc.pl.daily.map(d => d.total)} labels={W.dates?.map(d => d.replace(/-.*/, ""))} colorFn={v => v >= 0 ? st : tj.crimson} width={240} height={70} />
 <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, paddingTop: 8, borderTop: `1px solid ${tj.border}`, fontSize: 11, color: tj.gray700 }}>
 <span>MTD Rev: <b style={{ color: tj.ink, fontFamily: tj.fontMono }}>{fmtF(loc.totalRevenue.mtd)}</b></span>
 <span>MTD P/L: <b style={{ color: loc.pl.mtd >= 0 ? tj.ok : tj.crimson, fontFamily: tj.fontMono }}>{fmtF(loc.pl.mtd)}</b></span>
 </div>
 </Card>
 );
 })}
 </div>

 <Card padding={24} style={{ overflowX: "auto" }}>
 <Eyebrow style={{ marginBottom: 14 }}>Daily revenue detail</Eyebrow>
 <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
 <thead>
 <tr>
 <th style={{ textAlign: "left", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}`, fontFamily: tj.fontSans, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: tj.gray700, fontWeight: 700 }}>Location</th>
 {(W.dates || []).map((d, di) => (
 <th key={di} style={{ textAlign: "right", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}`, fontFamily: tj.fontSans, fontSize: 10, color: tj.gray700, fontWeight: 700, whiteSpace: "nowrap", letterSpacing: "0.06em" }}>
 {d}<br /><span style={{ fontSize: 9, fontWeight: 400 }}>{W.dayNames?.[di] || ""}</span>
 </th>
 ))}
 <th style={{ textAlign: "right", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}`, color: tj.navy900, fontWeight: 700, background: tj.surfaceCream, letterSpacing: "0.1em", textTransform: "uppercase", fontSize: 10 }}>Week</th>
 </tr>
 </thead>
 <tbody>
 {W.locations.map((loc, li) => (
 <tr key={li}>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}`, fontWeight: 700, color: tj.navy900 }}>{loc.name}</td>
 {loc.totalRevenue.daily.map((d, di) => (
 <td key={di} style={{ textAlign: "right", padding: "10px 8px", borderBottom: `1px solid ${tj.border}`, color: d.total > 0 ? tj.ink : tj.gray500, fontFamily: tj.fontMono }}>{fmtF(d.total)}</td>
 ))}
 <td style={{ textAlign: "right", padding: "10px 8px", borderBottom: `1px solid ${tj.border}`, fontWeight: 700, fontFamily: tj.fontMono, background: tj.surfaceCream }}>{fmtF(loc.totalRevenue.weekTotal)}</td>
 </tr>
 ))}
 <tr>
 <td style={{ padding: "12px 8px", borderTop: `2px solid ${tj.navy900}`, fontWeight: 700, color: tj.navy900 }}>Total</td>
 {W.locations[0]?.totalRevenue.daily.map((_, di) => {
 const t = W.locations.reduce((s, l) => s + (l.totalRevenue.daily[di]?.total || 0), 0);
 return <td key={di} style={{ textAlign: "right", padding: "12px 8px", borderTop: `2px solid ${tj.navy900}`, fontWeight: 700, fontFamily: tj.fontMono }}>{fmtF(t)}</td>;
 })}
 <td style={{ textAlign: "right", padding: "12px 8px", borderTop: `2px solid ${tj.navy900}`, fontWeight: 700, color: tj.ok, fontFamily: tj.fontMono, background: tj.surfaceCream, fontSize: 14 }}>{fmtF(wR)}</td>
 </tr>
 </tbody>
 </table>
 </Card>
 </>
 )}
 </div>
 )}

 {view === "benchmarks" && (() => {
 const jan26Idx = D.months.findIndex(m => /Jan\s*26/i.test(m));
 const ytdMonths = jan26Idx >= 0 ? D.months.length - jan26Idx : 0;
 const remainingMonths = Math.max(1, 12 - ytdMonths - (W ? 1 : 0));

 const locs = [
 { name: "Big Lake", key: "bigLake", color: tj.ok },
 { name: "Gonzalez", key: "gonzalez", color: tj.warn },
 { name: "Live Oak", key: "liveOak", color: tj.crimson },
 ];
 const locData = locs.map(loc => {
 const bench = BENCH[loc.key];
 const revArr = D[loc.key]?.rev || [];
 const ytdClosed = jan26Idx >= 0 ? revArr.slice(jan26Idx).reduce((s, v) => s + v, 0) : 0;
 const wLoc = W?.locations?.find(l => l.name.toLowerCase().includes(loc.name.split(" ")[0].toLowerCase()));
 const mtd = wLoc?.totalRevenue?.mtd || 0;
 const ytdTotal = ytdClosed + mtd;
 const pctDone = bench.target > 0 ? ytdTotal / bench.target : 0;
 const gap = bench.target - ytdTotal;
 const annualized = ytdMonths > 0 ? (ytdClosed / ytdMonths) * 12 : 0;
 const monthlyNeeded = gap > 0 ? gap / remainingMonths : 0;
 const avgMonthly = ytdMonths > 0 ? ytdClosed / ytdMonths : 0;
 const onPace = annualized >= bench.target;
 return { ...loc, bench, ytdClosed, mtd, ytdTotal, pctDone, gap, annualized, monthlyNeeded, avgMonthly, onPace };
 });
 const totalYTD = locData.reduce((s, l) => s + l.ytdTotal, 0);
 const totalGap = BENCH.total.target - totalYTD;
 const totalPct = BENCH.total.target > 0 ? totalYTD / BENCH.total.target : 0;
 const totalAnn = ytdMonths > 0 ? (locData.reduce((s, l) => s + l.ytdClosed, 0) / ytdMonths) * 12 : 0;
 const totalMonthlyNeeded = totalGap > 0 ? totalGap / remainingMonths : 0;

 return (
 <div>
 <Card accent={tj.crimson} accentSide="left" padding={28} style={{ marginBottom: 20 }}>
 <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18 }}>
 <div>
 <Eyebrow style={{ marginBottom: 6 }}>2026 Company Target</Eyebrow>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 38, fontWeight: 700, color: tj.navy900, fontVariantNumeric: "tabular-nums", letterSpacing: "-0.01em" }}>{fmtF(BENCH.total.target)}</div>
 <div style={{ fontSize: 12, color: tj.gray700, marginTop: 4, fontFamily: tj.fontSerif, fontStyle: "italic" }}>
 2025 actual: {fmtF(BENCH.total.prior)} · {((BENCH.total.target / BENCH.total.prior - 1) * 100).toFixed(1)}% growth required
 </div>
 </div>
 <div style={{ textAlign: "right" }}>
 <Eyebrow color={tj.gray700} style={{ marginBottom: 6 }}>YTD Actual</Eyebrow>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 32, fontWeight: 700, color: totalPct >= 0.25 ? tj.ok : tj.crimson, fontVariantNumeric: "tabular-nums" }}>{fmtF(totalYTD)}</div>
 <div style={{ fontSize: 12, color: tj.gray700, marginTop: 4 }}>{(totalPct * 100).toFixed(1)}% of target · {ytdMonths} mo closed{W ? " + MTD" : ""}</div>
 </div>
 </div>

 <div style={{ background: tj.surfaceCream, height: 28, position: "relative", marginBottom: 14, border: `1px solid ${tj.border}` }}>
 <div style={{ background: `linear-gradient(90deg, ${tj.navy900}, ${tj.sky})`, height: "100%", width: `${Math.min(totalPct * 100, 100)}%`, transition: "width 0.5s" }} />
 {[25, 50, 75].map(q => (
 <div key={q} style={{ position: "absolute", left: `${q}%`, top: 0, bottom: 0, width: 1, background: tj.gray500 }}>
 <span style={{ position: "absolute", top: -16, left: -8, fontSize: 9, color: tj.gray700, fontFamily: tj.fontSans, letterSpacing: "0.08em" }}>Q{q / 25}</span>
 </div>
 ))}
 <div style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", fontSize: 12, fontWeight: 700, color: tj.white, fontFamily: tj.fontMono }}>{(totalPct * 100).toFixed(1)}%</div>
 </div>

 <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
 <div><Eyebrow color={tj.gray700}>Gap</Eyebrow><div style={{ fontFamily: tj.fontSerif, fontSize: 18, fontWeight: 700, color: tj.crimson, fontVariantNumeric: "tabular-nums", marginTop: 4 }}>{fmtF(totalGap)}</div></div>
 <div><Eyebrow color={tj.gray700}>Annualized Pace</Eyebrow><div style={{ fontFamily: tj.fontSerif, fontSize: 18, fontWeight: 700, color: totalAnn >= BENCH.total.target ? tj.ok : tj.crimson, fontVariantNumeric: "tabular-nums", marginTop: 4 }}>{fmtF(totalAnn)}</div></div>
 <div><Eyebrow color={tj.gray700}>Need / Month</Eyebrow><div style={{ fontFamily: tj.fontSerif, fontSize: 18, fontWeight: 700, color: tj.warn, fontVariantNumeric: "tabular-nums", marginTop: 4 }}>{fmtF(totalMonthlyNeeded)}<span style={{ fontSize: 12, color: tj.gray700 }}> × {remainingMonths}mo</span></div></div>
 </div>
 </Card>

 <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20 }}>
 {locData.map((loc, li) => {
 const pctWidth = Math.min(loc.pctDone * 100, 100);
 const pace25 = (1 / 12) * ytdMonths * 100;
 return (
 <Card key={li} accent={loc.color} padding={20} style={{ flex: "1 1 320px", minWidth: 280 }}>
 <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
 <Eyebrow color={loc.color}>{loc.name}</Eyebrow>
 <span style={{ marginLeft: "auto", fontSize: 10, color: loc.onPace ? tj.ok : tj.crimson, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>{loc.onPace ? "On Pace" : "Behind"}</span>
 </div>
 <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
 <div><div style={{ fontSize: 9, color: tj.gray500, letterSpacing: "0.08em", fontWeight: 700, textTransform: "uppercase" }}>2026 Target</div><div style={{ fontFamily: tj.fontSerif, fontSize: 22, fontWeight: 700, color: tj.navy900, fontVariantNumeric: "tabular-nums" }}>{fmt(loc.bench.target)}</div></div>
 <div style={{ textAlign: "right" }}><div style={{ fontSize: 9, color: tj.gray500, letterSpacing: "0.08em", fontWeight: 700, textTransform: "uppercase" }}>YTD Actual</div><div style={{ fontFamily: tj.fontSerif, fontSize: 22, fontWeight: 700, color: loc.color, fontVariantNumeric: "tabular-nums" }}>{fmt(loc.ytdTotal)}</div></div>
 </div>
 <div style={{ background: tj.surfaceCream, border: `1px solid ${tj.border}`, height: 22, position: "relative", marginBottom: 12 }}>
 <div style={{ background: loc.color, height: "100%", width: `${pctWidth}%`, opacity: 0.85 }} />
 <div style={{ position: "absolute", left: `${pace25}%`, top: 0, bottom: 0, width: 2, background: tj.navy900, opacity: 0.6 }}>
 <span style={{ position: "absolute", top: -16, left: -16, fontSize: 9, color: tj.gray700, whiteSpace: "nowrap", letterSpacing: "0.08em" }}>should be</span>
 </div>
 <div style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", fontSize: 11, fontWeight: 700, color: tj.white, fontFamily: tj.fontMono, mixBlendMode: "difference" }}>{(loc.pctDone * 100).toFixed(1)}%</div>
 </div>
 <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontSize: 12 }}>
 <div><div style={{ color: tj.gray500, fontSize: 9, letterSpacing: "0.08em", fontWeight: 700, textTransform: "uppercase" }}>Gap</div><div style={{ fontWeight: 700, color: tj.crimson, fontFamily: tj.fontMono }}>{fmtF(loc.gap)}</div></div>
 <div><div style={{ color: tj.gray500, fontSize: 9, letterSpacing: "0.08em", fontWeight: 700, textTransform: "uppercase" }}>Annualized</div><div style={{ fontWeight: 700, color: loc.onPace ? tj.ok : tj.crimson, fontFamily: tj.fontMono }}>{fmt(loc.annualized)}</div></div>
 <div><div style={{ color: tj.gray500, fontSize: 9, letterSpacing: "0.08em", fontWeight: 700, textTransform: "uppercase" }}>Avg Month</div><div style={{ fontWeight: 700, fontFamily: tj.fontMono, color: tj.ink }}>{fmt(loc.avgMonthly)}</div></div>
 <div><div style={{ color: tj.gray500, fontSize: 9, letterSpacing: "0.08em", fontWeight: 700, textTransform: "uppercase" }}>Need / Month</div><div style={{ fontWeight: 700, color: loc.monthlyNeeded > loc.avgMonthly ? tj.crimson : tj.ok, fontFamily: tj.fontMono }}>{fmt(loc.monthlyNeeded)}</div></div>
 </div>
 <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${tj.border}`, fontSize: 11, color: tj.gray500, fontStyle: "italic", fontFamily: tj.fontSerif }}>
 2025 actual: {fmtF(loc.bench.prior)} · {((loc.bench.target / loc.bench.prior - 1) * 100).toFixed(1)}% growth required
 </div>
 </Card>
 );
 })}
 </div>
 </div>
 );
 })()}

 {view === "projections" && (
 <div>
 <Card padding={24} style={{ marginBottom: 16 }}>
 <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 12 }}>
 <div>
 <Eyebrow>Upload Archive</Eyebrow>
 <div style={{ fontSize: 12, color: tj.gray700, marginTop: 4 }}>Keeps monthly and weekly snapshots so projections don’t die with one overwrite.</div>
 </div>
 <Btn onClick={clearArchive}>Reset Archive</Btn>
 </div>
 {archive.length === 0 ? (
 <div style={{ fontSize: 13, color: tj.gray700, fontStyle: "italic", fontFamily: tj.fontSerif }}>No archived uploads yet. Upload a weekly CSV or monthly P&amp;L to start building history.</div>
 ) : (
 <div style={{ overflowX: "auto" }}>
 <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
 <thead>
 <tr>
 <th style={{ textAlign: "left", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}` }}>Type</th>
 <th style={{ textAlign: "left", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}` }}>Report Date</th>
 <th style={{ textAlign: "left", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}` }}>Uploaded</th>
 <th style={{ textAlign: "right", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}` }}>Headline</th>
 <th style={{ textAlign: "right", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}` }}>Updates</th>
 <th style={{ textAlign: "right", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}` }}>Action</th>
 </tr>
 </thead>
 <tbody>
 {archive.map((a, idx) => (
 <tr key={idx}>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}` }}>{a.kind}</td>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}` }}>{a.reportDate}</td>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}` }}>{timeAgo(a.uploadedAt)}</td>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono }}>{a.kind === "weekly" ? fmtF(a.weekPL) : fmtF(a.monthEbitda)}</td>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono }}>{a.updateCount || 1}</td>
 <td style={{ padding: "10px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right" }}><Btn onClick={() => deleteArchiveEntry(a.reportDate, a.kind)} style={{ padding: "6px 10px", fontSize: 9 }}>Delete</Btn></td>
 </tr>
 ))}
 </tbody>
 </table>
 </div>
 )}
 </Card>
 </div>
 )}
 </div>
 </div>
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
