function parseXLSX(buffer) {
 try {
 const wb = XLSX.read(new Uint8Array(buffer), { type: "array" });
 const conName = wb.SheetNames.find(n => /consol/i.test(n)) || wb.SheetNames[0];
 const raw = XLSX.utils.sheet_to_json(wb.Sheets[conName], { header: 1, defval: 0 });
 if (raw.length < 50) return null;
 let monthRow = -1;
 for (let r = 0; r < 10; r++) {
 const hits = (raw[r] || []).filter(c => typeof c === "string" && /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+2\d$/i.test(String(c).trim()));
 if (hits.length >= 6) { monthRow = r; break; }
 }
 if (monthRow < 0) return null;
 const monthCols = [];
 for (let c = 0; c < (raw[monthRow] || []).length; c++) {
 const v = String(raw[monthRow][c] || "").trim();
 if (/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+2\d$/i.test(v)) monthCols.push({ col: c, label: v });
 }
 const last12 = monthCols.slice(-12);
 const months = last12.map(m => m.label);
 const shortMo = months.map(m => m.split(" ")[0]);
 const cols = last12.map(m => m.col);
 const findRow = (search, from = 0) => {
 const s = search.toLowerCase();
 for (let r = from; r < raw.length; r++)
 for (let c = 0; c < Math.min(8, (raw[r] || []).length); c++)
 if (String(raw[r][c] || "").trim().toLowerCase().includes(s)) return r;
 return -1;
 };
 const getVals = (rowIdx) => rowIdx < 0 || !raw[rowIdx] ? cols.map(() => 0) :
 cols.map(c => { const v = raw[rowIdx]?.[c]; return typeof v === "number" ? v : parseFloat(String(v || "0").replace(/[$,()]/g, "")) || 0; });
 const result = {
 months, shortMo,
 revenue: getVals(findRow("Total Income")),
 solids: getVals(findRow("Total 6002")),
 uploadedAt: new Date().toISOString(),
 };
 for (const [key, search] of [["bigLake", "Big Lake"], ["gonzalez", "Gonzal"], ["liveOak", "Live Oak"]]) {
 const sn = wb.SheetNames.find(n => new RegExp(search, "i").test(n));
 if (!sn) { result[key] = { rev: cols.map(() => 0) }; continue; }
 const lraw = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: 0 });
 const lCols = [];
 for (let r = 0; r < 10; r++) {
 for (let c = 0; c < (lraw[r] || []).length; c++)
 if (typeof lraw[r][c] === "string" && /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+2\d$/i.test(lraw[r][c].trim())) lCols.push(c);
 if (lCols.length >= 6) break;
 }
 const ll12 = lCols.slice(-12);
 const lFind = (s) => { for (let r = 0; r < lraw.length; r++) for (let c = 0; c < 8; c++) if (String(lraw[r]?.[c] || "").toLowerCase().includes(s.toLowerCase())) return r; return -1; };
 const lVals = (ri) => ri < 0 ? ll12.map(() => 0) : ll12.map(c => typeof lraw[ri]?.[c] === "number" ? lraw[ri][c] : 0);
 result[key] = { rev: lVals(lFind("Total Income")) };
 }
 return result;
 } catch (e) { console.error("XLSX parse error:", e); return null; }
}

function parseNum(s) {
 if (!s || typeof s !== "string") return 0;
 s = s.trim().replace(/[$,\s]/g, "");
 if (s === "-" || s === "" || s === "n/a" || s.includes("DIV")) return 0;
 const neg = s.startsWith("(") && s.endsWith(")");
 if (neg) s = s.slice(1, -1);
 const n = parseFloat(s);
 return isNaN(n) ? 0 : neg ? -n : n;
}

function parseCSV(text) {
 const rows = [];
 let cur = "", inQ = false;
 for (const ch of text) {
 if (ch === '"') { inQ = !inQ; cur += ch; }
 else if (ch === '\n' && !inQ) { rows.push(cur); cur = ""; }
 else cur += ch;
 }
 if (cur.trim()) rows.push(cur);
 return rows.map(r => {
 const f = []; let field = "", q = false;
 for (const ch of r.replace(/\r/g, "")) {
 if (ch === '"') q = !q;
 else if (ch === "," && !q) { f.push(field.trim()); field = ""; }
 else field += ch;
 }
 f.push(field.trim());
 return f;
 });
}

function extractWeekly(csvText) {
 const rows = parseCSV(csvText);
 if (rows.length < 10) return null;
 let dates = [], updatedThru = "";
 const dp = /\d{1,2}-[A-Za-z]{3}/;
 for (let i = 0; i < 12; i++) {
 const r = rows[i];
 if (r && r.filter(c => dp.test(c)).length >= 3) {
 for (let c = 3; c < 22; c += 3) if (dp.test(r[c])) dates.push(r[c].trim());
 break;
 }
 }
 for (let i = 0; i < 5; i++)
 if (rows[i]?.[0] && /updated/i.test(rows[i][0]))
 updatedThru = rows[i][0].replace(/Updated thru\s*/i, "").trim();
 const locNames = ["Big Lake", "Gonzales", "Gonzalez", "Live Oak"];
 const locations = [];
 for (let i = 0; i < rows.length; i++) {
 const r = rows[i];
 if (!r?.[0]) continue;
 const lm = locNames.find(n => r[0].trim().toLowerCase().includes(n.toLowerCase()));
 if (!lm) continue;
 const ln = lm === "Gonzales" ? "Gonzalez" : lm;
 const loc = { name: ln };
 ["water","solids","solidsRev","totalRevenue","pl"].forEach(f => { loc[f] = { daily: [], weekTotal: 0, mtd: 0 }; });
 for (let d = 0; d < 7; d++) {
 const b = 3 + d * 3;
 loc.water.daily.push({ total: parseNum(r[b + 2]) });
 }
 loc.water.weekTotal = parseNum(r[24]);
 loc.water.mtd = parseNum(r[27]);
 for (let j = i + 1; j < Math.min(i + 15, rows.length); j++) {
 const sr = rows[j];
 if (!sr?.[1]) continue;
 const lb = sr[1].trim().toLowerCase();
 let t = null;
 if (lb.includes("solids") && lb.includes("revenue")) t = loc.solidsRev;
 else if (lb.includes("solid")) t = loc.solids;
 else if (lb.includes("total revenue")) t = loc.totalRevenue;
 else if (lb === "p/l") t = loc.pl;
 if (t) {
 t.daily = [];
 for (let d = 0; d < 7; d++) { const b = 3 + d * 3; t.daily.push({ total: parseNum(sr[b + 2]) }); }
 t.weekTotal = parseNum(sr[24]);
 t.mtd = parseNum(sr[27]);
 }
 if (sr[0]?.trim() && locNames.some(n => sr[0].trim().toLowerCase().includes(n.toLowerCase()))) break;
 if (lb === "p/l") break;
 }
 locations.push(loc);
 }
 return { dates, updatedThru, locations, uploadedAt: new Date().toISOString() };
}

const fmt = (n) => { if (Math.abs(n) >= 1e6) return `$${(n / 1e6).toFixed(2)}M`; if (Math.abs(n) >= 1000) return `$${(n / 1000).toFixed(0)}K`; return `$${Math.round(n)}`; };
const fmtFull = (n) => { if (n === 0) return "$0"; const s = `$${Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 })}`; return n < 0 ? `(${s})` : s; };
const fmtBonus = (n) => `$${n.toLocaleString("en-US", { maximumFractionDigits: 0 })}`;

function timeAgo(iso) {
 if (!iso) return "never";
 const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
 if (sec < 60) return "just now";
 if (sec < 3600) return `${Math.floor(sec / 60)} min ago`;
 if (sec < 86400) return `${Math.floor(sec / 3600)} hr ago`;
 const days = Math.floor(sec / 86400);
 if (days < 30) return `${days}d ago`;
 return `${Math.floor(days / 30)}mo ago`;
}

const TIER_COLORS = {
 STRETCH: { fg: tj.ok, bg: tj.okBg, label: "Stretch" },
 "TIER 2": { fg: tj.ok, bg: tj.okBg, label: "On Target" },
 "TIER 1": { fg: tj.warn, bg: tj.warnBg, label: "Tier 1" },
 BELOW: { fg: tj.crimson, bg: tj.badBg, label: "Below" },
};

function calcBonus(actual, target, targetBonus, stretchBonus) {
 const pace = target > 0 ? actual / target : 0;
 if (pace >= 1.10) return { tier: "STRETCH", pct: pace, bonus: targetBonus + stretchBonus };
 if (pace >= 1.00) return { tier: "TIER 2", pct: pace, bonus: targetBonus };
 if (pace >= 0.75) return { tier: "TIER 1", pct: pace, bonus: targetBonus * 0.5 };
 return { tier: "BELOW", pct: pace, bonus: 0 };
}

 );
}

function Gauge({ pct, label, value, target, tier, bonus, projected }) {
 const size = 200, stroke = 10;
 const r = (size - stroke) / 2;
 const cx = size / 2, cy = size / 2;
 const circ = Math.PI * r;
 const clamped = Math.max(0, Math.min(1.2, pct));
 const dash = (clamped / 1.2) * circ;
 const colors = TIER_COLORS[tier] || TIER_COLORS.BELOW;
 const markerAngle = (p) => {
 const a = Math.PI - (p / 1.2) * Math.PI;
 return { x: cx + r * Math.cos(a), y: cy - r * Math.sin(a) };
 };
 const m75 = markerAngle(0.75), m100 = markerAngle(1.00), m110 = markerAngle(1.10);
 return (
 <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
 <svg width={size} height={size / 2 + 38} style={{ overflow: "visible" }}>
 <path d={`M ${stroke / 2} ${cy} A ${r} ${r} 0 0 1 ${size - stroke / 2} ${cy}`} fill="none" stroke="#E8E3D8" strokeWidth={stroke} strokeLinecap="butt" />
 <path d={`M ${stroke / 2} ${cy} A ${r} ${r} 0 0 1 ${size - stroke / 2} ${cy}`} fill="none" stroke={colors.fg} strokeWidth={stroke} strokeLinecap="butt" strokeDasharray={`${dash} ${circ}`} style={{ transition: "stroke-dasharray 0.8s ease-out" }} />
 {[m75, m100, m110].map((m, idx) => (
 <line key={idx} x1={cx + (m.x - cx) * 0.92} y1={cy + (m.y - cy) * 0.92} x2={cx + (m.x - cx) * 1.08} y2={cy + (m.y - cy) * 1.08} stroke={tj.navy900} strokeWidth={1.5} />
 ))}
 <text x={m75.x} y={m75.y + 22} textAnchor="middle" fontSize="10" fill={tj.gray700} fontFamily={tj.fontSans} letterSpacing="0.08em">75%</text>
 <text x={m100.x} y={m100.y + 22} textAnchor="middle" fontSize="10" fill={tj.gray700} fontFamily={tj.fontSans} letterSpacing="0.08em">100%</text>
 <text x={m110.x} y={m110.y + 22} textAnchor="middle" fontSize="10" fill={tj.gray700} fontFamily={tj.fontSans} letterSpacing="0.08em">110%</text>
 <text x={cx} y={cy - 10} textAnchor="middle" fontSize="38" fontWeight="700" fill={tj.navy900} fontFamily={tj.fontSerif} letterSpacing="-0.02em">{(pct * 100).toFixed(0)}%</text>
 <text x={cx} y={cy + 8} textAnchor="middle" fontSize="9" fill={tj.gray700} fontFamily={tj.fontSans} letterSpacing="0.12em">OF TARGET</text>
 </svg>
 <div style={{ textAlign: "center", marginTop: -6 }}>
 <div style={{ fontSize: 13, fontWeight: 700, color: tj.navy900, letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</div>
 <div style={{ fontFamily: tj.fontMono, fontSize: 12, color: tj.gray700, marginTop: 4 }}>{fmt(value)} <span style={{ color: tj.gray500 }}>/ {fmt(target)}</span></div>
 <div style={{ display: "inline-block", marginTop: 8, background: colors.bg, color: colors.fg, padding: "4px 12px", fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>{colors.label} · {fmtBonus(bonus)}</div>
 {projected !== undefined && projected !== value && (
 <div style={{ fontFamily: tj.fontMono, fontSize: 10, color: tj.gray500, marginTop: 6, fontStyle: "italic" }}>year-end projection: {fmt(projected)}</div>
 )}
 </div>
 </div>
 );
}

function Btn({ children, primary, accent, onClick, style, type }) {
 const base = {
 fontFamily: tj.fontSans, fontSize: 11, fontWeight: 700,
 letterSpacing: "0.08em", textTransform: "uppercase",
 padding: "9px 16px", border: `1px solid ${tj.navy900}`,
 cursor: "pointer", transition: "all 150ms ease", borderRadius: 4,
 };
 const variant = primary ? { background: tj.navy900, color: "#fff" }
 : accent ? { background: tj.crimson, color: "#fff", borderColor: tj.crimson }
 : { background: "transparent", color: tj.navy900 };
 return <button onClick={onClick} type={type} style={{ ...base, ...variant, ...style }}>{children}</button>;
}

function App() {
 const [view, setView] = useState("today");
 const [D, setD] = useState(INIT);
 const [W, setW] = useState(null);
 const [selectedSlot, setSelectedSlot] = useState("TARGET");
 const [msg, setMsg] = useState("");
 const [, forceTick] = useState(0);
 const [slots, setSlots] = useState(DEFAULT_TARGETS);
 const [lockedSlots, setLockedSlots] = useState({ TARGET: true, STRETCH: true, CUSTOM: true });
 const [draft, setDraft] = useState({ bigLake: "", gonzalez: "", liveOak: "" });

 const planYear = (() => {
 const last = D.months?.[D.months.length - 1];
 if (!last) return new Date().getFullYear();
 const m = last.match(/\b(\d{2})\s*$/);
 if (!m) return new Date().getFullYear();
 return 2000 + parseInt(m[1], 10);
 })();

 const currentSlot = slots[selectedSlot] || DEFAULT_TARGETS[selectedSlot];
 const T = {
 label: SLOT_META[selectedSlot].label,
 bigLake: { ...BONUS_STRUCTURE.bigLake, target: currentSlot.bigLake },
 gonzalez: { ...BONUS_STRUCTURE.gonzalez, target: currentSlot.gonzalez },
 liveOak: { ...BONUS_STRUCTURE.liveOak, target: currentSlot.liveOak },
 total: { ...BONUS_STRUCTURE.total, target: currentSlot.bigLake + currentSlot.gonzalez + currentSlot.liveOak },
 };

 const isCurrentLocked = lockedSlots[selectedSlot];

 useEffect(() => {
 (async () => {
 try { const s = await window.storage.get("brooks-tj-m"); if (s?.value) setD(JSON.parse(s.value)); } catch (e) {}
 try { const s = await window.storage.get("brooks-tj-w"); if (s?.value) setW(JSON.parse(s.value)); } catch (e) {}
 try { const s = await window.storage.get("brooks-tj-slot"); if (s?.value) setSelectedSlot(s.value); } catch (e) {}
 try { const s = await window.storage.get("brooks-tj-slots"); if (s?.value) setSlots(JSON.parse(s.value)); } catch (e) {}
 try { const s = await window.storage.get("brooks-tj-locks"); if (s?.value) setLockedSlots(JSON.parse(s.value)); } catch (e) {}
 })();
 }, []);
 useEffect(() => { (async () => { try { await window.storage.set("brooks-tj-slot", selectedSlot); } catch (e) {} })(); }, [selectedSlot]);
 useEffect(() => { (async () => { try { await window.storage.set("brooks-tj-slots", JSON.stringify(slots)); } catch (e) {} })(); }, [slots]);
 useEffect(() => { (async () => { try { await window.storage.set("brooks-tj-locks", JSON.stringify(lockedSlots)); } catch (e) {} })(); }, [lockedSlots]);
 useEffect(() => { const id = setInterval(() => forceTick(n => n + 1), 60000); return () => clearInterval(id); }, []);

 const parseTargetInput = (raw) => {
 if (!raw) return null;
 let s = String(raw).trim().replace(/[$,\s]/g, "");
 let mult = 1;
 if (/m$/i.test(s)) { mult = 1_000_000; s = s.replace(/m$/i, ""); }
 else if (/k$/i.test(s)) { mult = 1_000; s = s.replace(/k$/i, ""); }
 const n = parseFloat(s);
 if (isNaN(n) || n < 0) return null;
 return Math.round(n * mult);
 };

 const lockCurrentSlot = useCallback(() => {
 const next = { ...slots[selectedSlot] };
 for (const k of ["bigLake", "gonzalez", "liveOak"]) {
 if (draft[k]) { const parsed = parseTargetInput(draft[k]); if (parsed !== null) next[k] = parsed; }
 }
 setSlots({ ...slots, [selectedSlot]: next });
 setDraft({ bigLake: "", gonzalez: "", liveOak: "" });
 setLockedSlots({ ...lockedSlots, [selectedSlot]: true });
 setMsg(`${SLOT_META[selectedSlot].label} locked: ${fmt(next.bigLake + next.gonzalez + next.liveOak)} total`);
 setTimeout(() => setMsg(""), 4000);
 }, [slots, selectedSlot, draft, lockedSlots]);

 const unlockCurrentSlot = useCallback(() => {
 const cur = slots[selectedSlot];
 setDraft({ bigLake: String(cur.bigLake), gonzalez: String(cur.gonzalez), liveOak: String(cur.liveOak) });
 setLockedSlots({ ...lockedSlots, [selectedSlot]: false });
 }, [slots, selectedSlot, lockedSlots]);

 const switchSlot = (slotKey) => {
 setSelectedSlot(slotKey);
 setDraft({ bigLake: "", gonzalez: "", liveOak: "" });
 };

 const handleFile = useCallback(async (file) => {
 const name = file.name.toLowerCase();
 if (name.endsWith(".csv")) {
 const text = await file.text();
 const parsed = extractWeekly(text);
 if (parsed?.locations?.length > 0) {
 setW(parsed); setMsg("Weekly loaded: " + parsed.updatedThru);
 try { await window.storage.set("brooks-tj-w", JSON.stringify(parsed)); } catch (e) {}
 } else setMsg("Could not parse CSV");
 } else if (name.endsWith(".xlsx") || name.endsWith(".xls")) {
 const buf = await file.arrayBuffer();
 const parsed = parseXLSX(buf);
 if (parsed?.revenue?.length > 0) {
 setD(parsed); setMsg("P&L loaded: " + parsed.months[parsed.months.length - 1]);
 try { await window.storage.set("brooks-tj-m", JSON.stringify(parsed)); } catch (e) {}
 } else setMsg("Could not parse XLSX");
 }
 setTimeout(() => setMsg(""), 5000);
 }, []);
 const onDrop = useCallback((e) => { e.preventDefault(); const f = e.dataTransfer?.files?.[0]; if (f) handleFile(f); }, [handleFile]);
 const onInput = useCallback((e) => { const f = e.target.files?.[0]; if (f) handleFile(f); }, [handleFile]);

 const planYrShort = String(planYear).slice(-2);
 const janRegex = new RegExp(`Jan\\s*${planYrShort}`, "i");
 const janIdx = D.months.findIndex(m => janRegex.test(m));
 const ytdMonths = janIdx >= 0 ? D.months.length - janIdx : 0;
 const totalMonthsRemaining = Math.max(1, 12 - ytdMonths);
 const daysRemaining = Math.max(0, Math.ceil((new Date(`${planYear}-12-31T23:59:59`) - Date.now()) / 86400000));

 const ytd = (locKey) => {
 const arr = D[locKey]?.rev || [];
 const closed = janIdx >= 0 ? arr.slice(janIdx).reduce((s, v) => s + v, 0) : 0;
 const wLoc = W?.locations?.find(l => l.name.toLowerCase().includes(locKey === "bigLake" ? "big lake" : locKey === "liveOak" ? "live oak" : "gonzal"));
 const mtd = wLoc?.totalRevenue?.mtd || 0;
 const total = closed + mtd;

 <thead>
 <tr>
 {["Location", "Target", "75% threshold", "110% stretch", "Bonus @ 100%", "Bonus @ stretch"].map((h, i) => (
 <th key={i} style={{ textAlign: i === 0 ? "left" : "right", padding: "10px 8px", borderBottom: `2px solid ${tj.navy900}`, fontFamily: tj.fontSans, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: tj.gray700, fontWeight: 700 }}>{h}</th>
 ))}
 </tr>
 </thead>
 <tbody>
 {[
 { name: "Big Lake", t: T.bigLake },
 { name: "Gonzalez", t: T.gonzalez },
 { name: "Live Oak", t: T.liveOak },
 ].map((loc, i) => (
 <tr key={i}>
 <td style={{ padding: "12px 8px", borderBottom: `1px solid ${tj.border}`, fontWeight: 700, color: tj.navy900 }}>{loc.name}</td>
 <td style={{ padding: "12px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono }}>{fmtFull(loc.t.target)}</td>
 <td style={{ padding: "12px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.gray700 }}>{fmtFull(loc.t.target * 0.75)}</td>
 <td style={{ padding: "12px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.gray700 }}>{fmtFull(loc.t.target * 1.10)}</td>
 <td style={{ padding: "12px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.ok, fontWeight: 700 }}>{fmtBonus(loc.t.targetBonus)}</td>
 <td style={{ padding: "12px 8px", borderBottom: `1px solid ${tj.border}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.ok, fontWeight: 700 }}>{fmtBonus(loc.t.targetBonus + loc.t.stretchBonus)}</td>
 </tr>
 ))}
 <tr>
 <td style={{ padding: "14px 8px", borderTop: `2px solid ${tj.navy900}`, color: tj.navy900, fontWeight: 700 }}>Total</td>
 <td style={{ padding: "14px 8px", borderTop: `2px solid ${tj.navy900}`, textAlign: "right", fontFamily: tj.fontMono, fontWeight: 700 }}>{fmtFull(T.total.target)}</td>
 <td style={{ padding: "14px 8px", borderTop: `2px solid ${tj.navy900}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.gray700, fontWeight: 700 }}>{fmtFull(T.total.target * 0.75)}</td>
 <td style={{ padding: "14px 8px", borderTop: `2px solid ${tj.navy900}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.gray700, fontWeight: 700 }}>{fmtFull(T.total.target * 1.10)}</td>
 <td style={{ padding: "14px 8px", borderTop: `2px solid ${tj.navy900}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.ok, fontWeight: 700 }}>{fmtBonus(20000)}</td>
 <td style={{ padding: "14px 8px", borderTop: `2px solid ${tj.navy900}`, textAlign: "right", fontFamily: tj.fontMono, color: tj.ok, fontWeight: 700 }}>{fmtBonus(40000)}</td>
 </tr>
 </tbody>
 </table>
 </Card>

 <Card padding={28} style={{ marginBottom: 20 }}>
 <Eyebrow style={{ marginBottom: 14 }}>The rules</Eyebrow>
 {[
 { k: "Each location is judged separately", v: "Hit stretch at Big Lake, miss at Live Oak — you still earn the Big Lake bonus." },
 { k: "No pro-rata between tiers", v: "At 74% of target = $0 for that location. At 75% = 50% of the location's target bonus." },
 { k: "Stretch is additive", v: "Hitting 110% earns BOTH the target bonus AND the stretch bonus for that location." },
 { k: "Measured at year-end", v: `Bonus is calculated after ${planYear} closes and financials are finalized.` },
 { k: "Active employment required", v: `Must be actively employed through Dec 31, ${planYear} to receive any bonus payout.` },
 ].map((r, i, arr) => (
 <div key={i} style={{ padding: "14px 0", borderBottom: i < arr.length - 1 ? `1px solid ${tj.border}` : "none", display: "grid", gridTemplateColumns: "280px 1fr", gap: 24 }}>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 15, fontWeight: 700, color: tj.navy900 }}>{r.k}</div>
 <div style={{ fontSize: 13, color: tj.gray700, lineHeight: 1.6 }}>{r.v}</div>
 </div>
 ))}
 </Card>

 <Card padding={28}>
 <Eyebrow style={{ marginBottom: 14 }}>Scenarios</Eyebrow>
 {[
 { l: "100% at all locations", bl: T.bigLake.targetBonus, gn: T.gonzalez.targetBonus, lo: T.liveOak.targetBonus, c: tj.ok },
 { l: "Stretch at Big Lake, 100% at Gonzalez, miss Live Oak", bl: T.bigLake.targetBonus * 2, gn: T.gonzalez.targetBonus, lo: 0, c: tj.warn },
 { l: "75% at all locations", bl: T.bigLake.targetBonus * 0.5, gn: T.gonzalez.targetBonus * 0.5, lo: T.liveOak.targetBonus * 0.5, c: tj.warn },
 { l: "Stretch at all locations · maximum", bl: T.bigLake.targetBonus * 2, gn: T.gonzalez.targetBonus * 2, lo: T.liveOak.targetBonus * 2, c: tj.crimson },
 ].map((s, i, arr) => (
 <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0", borderBottom: i < arr.length - 1 ? `1px solid ${tj.border}` : "none" }}>
 <div style={{ fontSize: 14, color: tj.ink, flex: 1 }}>{s.l}</div>
 <div style={{ fontFamily: tj.fontMono, fontSize: 12, color: tj.gray500, marginRight: 20 }}>{fmtBonus(s.bl)} + {fmtBonus(s.gn)} + {fmtBonus(s.lo)}</div>
 <div style={{ fontFamily: tj.fontSerif, fontSize: 20, fontWeight: 700, color: s.c, fontVariantNumeric: "tabular-nums" }}>= {fmtBonus(s.bl + s.gn + s.lo)}</div>
 </div>
 ))}
 </Card>
 </div>
 )}

 <div style={{ marginTop: 36, paddingTop: 18, borderTop: `1px solid ${tj.border}`, fontSize: 11, color: tj.gray500, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12, letterSpacing: "0.04em" }}>
 <span>Brooks's Sales Scoreboard · {T.label} · {ytdMonths} months closed</span>
 <span style={{ fontStyle: "italic", fontFamily: tj.fontSerif }}>Drive the number.</span>
 </div>
 </div>
 </div>
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
